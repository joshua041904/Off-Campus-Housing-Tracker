# Apply after k8s/ollama-worker-configmap.yaml, Kafka, Ollama. Redis URL from app-config (host Docker :6380 by default).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-worker
  namespace: off-campus-housing-tracker
  labels:
    app: ollama-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ollama-worker
  template:
    metadata:
      labels:
        app: ollama-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: npm-install
          image: node:20-alpine
          command: ["sh", "-ec"]
          args:
            - |
              set -e
              cp /config/package.json /config/worker.js /work/
              cd /work && npm install --omit=dev --no-audit --no-fund
          volumeMounts:
            - name: code
              mountPath: /config
              readOnly: true
            - name: work
              mountPath: /work
        - name: wait-kafka-tcp
          image: busybox:1.36
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
                  optional: true
          command: ["sh", "-c"]
          args:
            - |
              set -e
              raw="${KAFKA_BROKER:-kafka-0.kafka-headless:9093}"
              first="${raw%%,*}"
              host="${first%%:*}"
              port="${first##*:}"
              if [ "$port" = "$host" ]; then port=9093; fi
              echo "[wait-kafka-tcp] until nc -z $host $port (from KAFKA_BROKER first seed)"
              i=0
              until nc -z "$host" "$port" 2>/dev/null; do
                i=$((i+1))
                if [ "$i" -gt 180 ]; then echo "[wait-kafka-tcp] timeout"; exit 1; fi
                sleep 2
              done
              echo "[wait-kafka-tcp] ok"
      containers:
        - name: worker
          image: node:20-alpine
          workingDir: /work
          command: ["node", "worker.js"]
          ports:
            - name: metrics
              containerPort: 9100
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
                  optional: true
            - name: KAFKA_SSL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_SSL_ENABLED
                  optional: true
            - name: KAFKA_CA_CERT
              value: "/etc/kafka/secrets/ca-cert.pem"
            - name: KAFKA_CLIENT_CERT
              value: "/etc/kafka/secrets/tls.crt"
            - name: KAFKA_CLIENT_KEY
              value: "/etc/kafka/secrets/tls.key"
            - name: OLLAMA_JOBS_TOPIC
              value: "ollama-jobs"
            - name: OLLAMA_DLQ_TOPIC
              value: "ollama-jobs-dlq"
            - name: OLLAMA_WORKER_METRICS_PORT
              value: "9100"
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_MODEL
                  optional: true
          volumeMounts:
            - name: work
              mountPath: /work
            - name: kafka-ssl
              mountPath: /etc/kafka/secrets
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: code
          configMap:
            name: ollama-worker-code
        - name: work
          emptyDir: {}
        - name: kafka-ssl
          secret:
            secretName: och-kafka-ssl-secret
            optional: true
            items:
              - key: ca-cert.pem
                path: ca-cert.pem
              - key: client.crt
                path: tls.crt
              - key: client.key
                path: tls.key
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-worker
  namespace: off-campus-housing-tracker
  labels:
    app: ollama-worker
spec:
  type: ClusterIP
  selector:
    app: ollama-worker
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
