# Off-Campus Housing Tracker — local/dev mirror of infra/k8s/base/haproxy (api-gateway only).
global
  log stdout format raw local0
  maxconn 5000
  tune.bufsize 32768

defaults
  mode http
  log global
  option httplog
  option http-keep-alive
  timeout connect 5s
  timeout client  60s
  timeout server  60s
  retries 3

resolvers k8s
  nameserver dns1 10.43.0.10:53
  accepted_payload_size 8192
  hold valid 10s

frontend fe_api
  bind *:8081
  http-request set-header X-Forwarded-Proto https if { ssl_fc }
  http-request set-header X-Forwarded-Proto http  if !{ ssl_fc }
  http-request set-header X-Forwarded-Host   %[req.hdr(Host)]
  default_backend be_api

backend be_api
  balance leastconn
  http-reuse always
  option httpchk GET /readyz
  http-check expect status 200
  default-server inter 3s fall 2 rise 3
  server api api-gateway.off-campus-housing-tracker.svc.cluster.local:4020 check init-addr none resolvers k8s

listen stats
  bind *:8404
  mode http
  stats enable
  stats uri /
  stats refresh 2s
