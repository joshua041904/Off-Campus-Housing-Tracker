# Envoy in ingress-nginx: HTTP/2 and gRPC proxy with strict TLS to backends.
# Requires: dev-root-ca secret in ingress-nginx (same as Caddy).
# gRPC/HTTP2: NodePort 30001; in-cluster: envoy.ingress-nginx.svc.cluster.local:10000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-grpc-config
  namespace: ingress-nginx
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 10000
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: grpc
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match: { prefix: "/auth." }
                    route: { cluster: auth_service }
                  - match: { prefix: "/records." }
                    route: { cluster: records_service }
                  - match: { prefix: "/messaging." }
                    route: { cluster: messaging_service }
                  - match: { prefix: "/listings." }
                    route: { cluster: listings_service }
                  - match: { prefix: "/analytics." }
                    route: { cluster: analytics_service }
                  - match: { prefix: "/shopping." }
                    route: { cluster: shopping_service }
                  - match: { prefix: "/booking." }
                    route: { cluster: booking_service }
                  - match: { prefix: "/auction_monitor." }
                    route: { cluster: auction_monitor_service }
                  - match: { prefix: "/auction-monitor." }
                    route: { cluster: auction_monitor_service }
                  - match: { prefix: "/python_ai." }
                    route: { cluster: python_ai_service }
                  - match: { prefix: "/python-ai." }
                    route: { cluster: python_ai_service }
                  - match: { prefix: "/" }
                    route: { cluster: auth_service }
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: auth_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: auth_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: auth-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50051
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: records_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: records_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: records-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50051
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: messaging_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: messaging_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: messaging-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50064
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: listings_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: listings_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: listings-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50057
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: analytics_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: analytics_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: analytics-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50054
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: shopping_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: shopping_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: shopping-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50058
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: booking_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: booking_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: booking-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50063
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: auction_monitor_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: auction_monitor_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: auction-monitor.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50059
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
      - name: python_ai_service
        connect_timeout: 5s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        load_assignment:
          cluster_name: python_ai_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: python-ai-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50060
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.local
            common_tls_context:
              validation_context:
                trusted_ca: { filename: /etc/certs/ca/dev-root.pem }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: ingress-nginx
  labels: { app: envoy }
spec:
  replicas: 1
  selector: { matchLabels: { app: envoy } }
  template:
    metadata: { labels: { app: envoy } }
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - { name: grpc, containerPort: 10000 }
        command:
        - /usr/local/bin/envoy
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - envoy
        - --service-node
        - envoy
        - --log-level
        - info
        volumeMounts:
        - { name: envoy-config, mountPath: /etc/envoy }
        - { name: ca-cert, mountPath: /etc/certs/ca, readOnly: true }
        readinessProbe:
          tcpSocket: { port: 10000 }
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 1
        livenessProbe:
          tcpSocket: { port: 10000 }
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-grpc-config
      - name: ca-cert
        secret:
          secretName: dev-root-ca
          items:
          - { key: dev-root.pem, path: dev-root.pem }
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: ingress-nginx
  labels: { app: envoy }
spec:
  type: NodePort
  selector: { app: envoy }
  ports:
  - { name: grpc, port: 10000, targetPort: 10000, nodePort: 30001, protocol: TCP }
