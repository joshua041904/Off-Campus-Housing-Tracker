# Caddy HTTP/3 service (NodePort). Use when METALLB_ENABLED=0. nodePort 30443 for HTTP/2 and HTTP/3 (QUIC).
# k3d must publish 30443 TCP+UDP (scripts/k3d-create-2-node-cluster.sh).
apiVersion: v1
kind: Service
metadata:
  name: caddy-h3
  namespace: ingress-nginx
spec:
  type: NodePort
  selector:
    app: caddy-h3
  ports:
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
    nodePort: 30443
  - name: https-udp
    port: 443
    targetPort: 443
    protocol: UDP
    nodePort: 30443
  - name: grpc-h2c
    port: 5000
    targetPort: 5000
    protocol: TCP
  - name: admin
    port: 2019
    targetPort: 2019
    protocol: TCP
