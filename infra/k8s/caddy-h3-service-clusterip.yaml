# Caddy HTTP/3 service (ClusterIP). Use with k3d 443@loadbalancer + Caddy hostPort 443.
# No LoadBalancer, no NodePort — external traffic: Mac → loadbalancer container → Caddy hostPort.
# Apply this instead of caddy-h3-service.yaml when using scripts/k3d-create-off-campus-housing-tracker-443-lb.sh.
apiVersion: v1
kind: Service
metadata:
  name: caddy-h3
  namespace: ingress-nginx
spec:
  type: ClusterIP
  selector:
    app: caddy-h3
  ports:
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
  - name: https-udp
    port: 443
    targetPort: 443
    protocol: UDP
  - name: grpc-h2c
    port: 5000
    targetPort: 5000
    protocol: TCP
  - name: admin
    port: 2019
    targetPort: 2019
    protocol: TCP
