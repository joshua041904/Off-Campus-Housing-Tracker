apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: off-campus-housing-tracker
  labels: { app: kafka }
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9093
      targetPort: 9093
    - name: controller
      port: 9095
      targetPort: 9095
