# One LoadBalancer per broker so each broker can advertise a stable hostname (MetalLB EXTERNAL-IP).
# In-cluster clients: use kafka-N-external.<ns>.svc.cluster.local:9094 or headless kafka-N.kafka:9093.
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-0-external
  namespace: off-campus-housing-tracker
  labels: { app: kafka }
spec:
  type: LoadBalancer
  selector:
    statefulset.kubernetes.io/pod-name: kafka-0
  ports:
    - name: external
      port: 9094
      targetPort: 9094
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-1-external
  namespace: off-campus-housing-tracker
  labels: { app: kafka }
spec:
  type: LoadBalancer
  selector:
    statefulset.kubernetes.io/pod-name: kafka-1
  ports:
    - name: external
      port: 9094
      targetPort: 9094
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-2-external
  namespace: off-campus-housing-tracker
  labels: { app: kafka }
spec:
  type: LoadBalancer
  selector:
    statefulset.kubernetes.io/pod-name: kafka-2
  ports:
    - name: external
      port: 9094
      targetPort: 9094
