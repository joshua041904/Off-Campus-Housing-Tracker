# Optional 3-broker KRaft + TLS + per-broker MetalLB LoadBalancers (Colima/k3s).
# Does not replace base/kafka (ZooKeeper single replica); apply this overlay when you want quorum + MetalLB.
#
# Prereqs:
#   - Namespace off-campus-housing-tracker
#   - Secret kafka-ssl-secret (scripts/kafka-ssl-from-dev-root.sh — dynamic SANs per replica + optional MetalLB IPs)
#   - Optional: pnpm verify:kafka-tls-sans — fail if broker PEM SANs drift
#   - Optional cert-manager: infra/k8s/kafka-certs/README.md
#   - MetalLB installed and an address pool configured
# App pods: infra/k8s/base/config/app-config.yaml defaults KAFKA_BROKER to this cluster’s headless bootstrap (comma-separated).
# Host-only Compose Kafka: use kubectl apply -k infra/k8s/overlays/kafka-host-compose/ instead of that default.
#
# Apply (single bundle):
#   kubectl apply -k infra/k8s/kafka-kraft-metallb/
#
# Recommended for laptops (MetalLB IP rotation + TLS SAN alignment):
#   make apply-kafka-kraft   → scripts/apply-kafka-kraft-staged.sh
#   (Services + wait LB IPs → kafka-ssl-from-dev-root → StatefulSet; rollout restart if SS already existed)
#
# Recovery (quorum stuck / endless candidate / cannot connect :9095 after listener or cluster-id changes):
#   See docs/runbooks/kafka-kraft-stale-dns-rca.md — verify EndpointSlice vs pod IP (scripts/validate-kafka-dns.sh).
#   If needed: delete EndpointSlices labeled kubernetes.io/service-name=kafka, rollout restart StatefulSet.
#   Scale to zero + delete PVCs data-kafka-0,1,2 only if intentional metadata loss; re-apply secrets/topics scripts.
#   StatefulSet startup fails fast if meta.properties cluster.id ≠ CLUSTER_ID env (see statefulset command).
#
# Kafka advertised.listeners: the EXTERNAL listener IP is discovered by initContainer fetch-external-lb-ip (Kubernetes API),
# written to a shared volume, and applied in the main container startup script to /etc/kafka/kafka.properties — not via static
# KAFKA_ADVERTISED_LISTENERS in the StatefulSet env (see scripts/verify-kafka-no-static-advertised-env.sh).
#
# Optional Prometheus: kafka-metallb-alignment-exporter compares LB Service IPs to broker advertised EXTERNAL.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: off-campus-housing-tracker
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: kafka-metallb-alignment-exporter-script
    files:
      - exporter.py=exporter.py
resources:
  - headless-service.yaml
  - external-services.yaml
  - rbac-kafka-svc-reader.yaml
  - kafka-pdb.yaml
  - statefulset.yaml
  - kafka-metallb-alignment-exporter.yaml
