# one file, six docs – apply to all your services

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: off-campus-housing-tracker
spec:
  strategy:
    type: Recreate
  template:
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: app
        lifecycle:
          preStop:
            exec:
              command: ["sh","-lc","sleep 1"]

