apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: off-campus-housing-tracker
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0  # Zero-downtime deployments
  template:
    spec:
      terminationGracePeriodSeconds: 30  # Increased from 5s for graceful shutdown
      containers:
      - name: app
        lifecycle:
          preStop:
            exec:
              command: ["sh","-lc","sleep 10"]  # Give time for graceful shutdown

