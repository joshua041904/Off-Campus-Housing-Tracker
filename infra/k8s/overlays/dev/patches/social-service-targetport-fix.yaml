# Permanent fix for social-service targetPort (http -> 4006)
# This ensures the service routes correctly to port 4006
apiVersion: v1
kind: Service
metadata:
  name: social-service
  namespace: off-campus-housing-tracker
spec:
  ports:
    - name: http
      port: 4006
      targetPort: 4006  # Changed from "http" to numeric 4006
      protocol: TCP
