# Dev overlay (Mac / Colima): analytics uses host `ollama serve` (Metal) instead of in-cluster Linux Ollama (CPU).
# Pods must resolve host.docker.internal (Colima/Docker Desktop; see scripts/colima-apply-host-aliases.sh).
#
# Intentionally does NOT set ANALYTICS_DEV_FAST_MODE — keep app-config / Listing Intelligence v2 behavior;
# only the upstream HTTP target changes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: off-campus-housing-tracker
spec:
  template:
    spec:
      containers:
        - name: app
          env:
            - name: OLLAMA_BASE_URL
              value: "http://host.docker.internal:11434"
