# Allow scheduling when node has disk pressure (single-node Colima). Fix disk: ./scripts/emergency-disk-cleanup.sh
# Apply to record-platform and envoy-test so pods can reach 1/1 Ready with strict TLS/mTLS.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: record-platform
spec:
  template:
    spec:
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
---
