apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: off-campus-housing-tracker
spec:
  template:
    spec:
      containers:
        - name: api-gateway
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: x-traffic-class
                  value: infra
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              httpHeaders:
                - name: x-traffic-class
                  value: infra
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6

