apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: off-campus-housing-tracker-privacy-terms
  namespace: off-campus-housing-tracker
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  # Catch-all rule for any hostname (ngrok, etc.)
  - http:
      paths:
      - path: /privacy
        pathType: Exact
        backend:
          service:
            name: auth-service
            port:
              number: 4001
      - path: /terms
        pathType: Exact
        backend:
          service:
            name: auth-service
            port:
              number: 4001
  # Specific rule for off-campus-housing.local
  - host: off-campus-housing.local
    http:
      paths:
      - path: /privacy
        pathType: Exact
        backend:
          service:
            name: auth-service
            port:
              number: 4001
      - path: /terms
        pathType: Exact
        backend:
          service:
            name: auth-service
            port:
              number: 4001

