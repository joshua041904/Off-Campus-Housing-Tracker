apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: off-campus-housing-tracker-grpc
  namespace: off-campus-housing-tracker
  annotations:
    # CRITICAL: Backend protocol must be GRPC
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/grpc-backend: "true"
    # Enable HTTP/2
    nginx.ingress.kubernetes.io/http2-push-preload: "true"
    # No body size limit for gRPC streaming
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # Force HTTP/2 upstream
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    # ALPN negotiation
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - off-campus-housing.local
    secretName: off-campus-housing-local-tls
  rules:
  - host: off-campus-housing.local
    http:
      paths:
      - path: /records.RecordsService
        pathType: Prefix
        backend:
          service:
            name: records-service
            port:
              number: 50051
      - path: /auth.AuthService
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 50051
      - path: /messaging.v1.MessagingService
        pathType: Prefix
        backend:
          service:
            name: messaging-service
            port:
              number: 50064
      - path: /listings.ListingsService
        pathType: Prefix
        backend:
          service:
            name: listings-service
            port:
              number: 50057
      - path: /shopping.ShoppingService
        pathType: Prefix
        backend:
          service:
            name: shopping-service
            port:
              number: 50058
      - path: /analytics.AnalyticsService
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 50067
      - path: /notification.NotificationService
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              number: 50065
