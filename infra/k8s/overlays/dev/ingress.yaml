apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: off-campus-housing-tracker
  namespace: off-campus-housing-tracker
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Prefix paths only: /api and /auth before / (catch-all to nginx). Regex+rewrite removed — avoids /auth falling through to static nginx.
    # Enable HTTP/2
    nginx.ingress.kubernetes.io/http2-push-preload: "true"
    # Force HTTP/2 upstream (no HTTP/1.1 fallback)
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "100"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts: [off-campus-housing.test]
    secretName: off-campus-housing-local-tls
  rules:
  # Catch-all rule for any hostname (ngrok, etc.)
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 4020
      # Gateway proxies /auth/* (e.g. k6 → /auth/healthz). Must appear before / → nginx.
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 4020
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 8080
  # Specific rule for off-campus-housing.test (for backwards compatibility)
  - host: off-campus-housing.test
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 4020
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 4020
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 8080
