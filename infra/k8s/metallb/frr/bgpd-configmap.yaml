# Minimal bgpd config so FRR accepts BGP from MetalLB speakers (pod IPs in cluster CIDR).
# k3d pod CIDR is typically 10.42.0.0/16; adjust if your cluster uses a different range.
apiVersion: v1
kind: ConfigMap
metadata:
  name: frr-bgpd
  namespace: metallb-system
data:
  bgpd.conf: |
    router bgp 64512
     no bgp ebgp-requires-policy
     neighbor metallb peer-group
     neighbor metallb remote-as 64512
     bgp listen range 10.42.0.0/16 peer-group metallb
     address-family ipv4 unicast
      neighbor metallb activate
     exit-address-family
