# ConfigMap for caddy-h3 (HTTP/2 + HTTP/3) - used by caddy-h3-deploy.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-h3
  namespace: ingress-nginx
data:
  Caddyfile: |
    # -----------------------------------------------------------------------------
    # Off-Campus-Housing-Tracker — production-grade Caddy (network spine lock)
    # SNI: off-campus-housing.test only. No record-local; no protocol ambiguity.
    # Data path: Caddy → services directly (no ingress-nginx in path).
    # -----------------------------------------------------------------------------
    {
      admin 0.0.0.0:2019
      grace_period 15s
      shutdown_delay 10s
      log {
        output stdout
        format json
        level INFO
      }
      # Edge terminates TLS; under k6 burst, OS accept queue / ephemeral ports (Colima) can surface as
      # dial tcp: connection refused — tune VM ulimit -n and somaxconn; gateway/Haproxy maxconn raised in manifests.
      servers {
        protocols h1 h2 h3
        timeouts {
          idle 5m
          read_body 3m
          write 3m
        }
        enable_full_duplex
        max_header_size 1MiB
      }
    }

    https://off-campus-housing.test {
      tls /etc/caddy/certs/tls.crt /etc/caddy/certs/tls.key {
        protocols tls1.2 tls1.3
        ciphers TLS_AES_128_GCM_SHA256 TLS_AES_256_GCM_SHA384 TLS_CHACHA20_POLY1305_SHA256
      }

      log request_access {
        output stdout
        format json
        level INFO
      }

      request_header X-Request-Id {http.request.uuid}
      # Edge HTTP version (HTTP/1.1, HTTP/2.0, HTTP/3.0) — not {http.request.tls.proto} (TLS version).
      request_header X-OCH-Edge-Proto {http.request.proto}

      @wrong_host not host off-campus-housing.test
      handle @wrong_host {
        respond "Invalid Host" 421
      }

      handle_path /_caddy/healthz {
        header {
          alt-svc "h3=\":443\"; ma=2592000"
        }
        respond "ok" 200
      }

      @privacy path /privacy
      handle @privacy {
        reverse_proxy http://auth-service.off-campus-housing-tracker.svc.cluster.local:4011 {
          header_up Host {http.request.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
        }
      }

      @terms path /terms
      handle @terms {
        reverse_proxy http://auth-service.off-campus-housing-tracker.svc.cluster.local:4011 {
          header_up Host {http.request.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
        }
      }

      @grpc header Content-Type application/grpc*
      handle @grpc {
        reverse_proxy envoy-test.envoy-test.svc.cluster.local:10000 {
          header_up Host {http.request.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          transport http {
            versions h2c
            dial_timeout 10s
            response_header_timeout 60s
            read_buffer 32MiB
            write_buffer 32MiB
            keepalive 2m
            keepalive_interval 30s
            keepalive_idle_conns 256
            keepalive_idle_conns_per_host 64
          }
        }
      }

      # Observability: Jaeger keeps /jaeger prefix (QUERY_BASE_PATH).
      # Grafana: do NOT strip /grafana — with GF_SERVER_SERVE_FROM_SUB_PATH=true, stripping caused 301→/grafana/ loops (upstream always saw "/").
      # Prometheus: forward full /prometheus/*; use --web.route-prefix=/prometheus/ on the Deployment (no strip here).
      @jaeger path /jaeger /jaeger/*
      handle @jaeger {
        reverse_proxy http://jaeger.observability.svc.cluster.local:16686 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Forwarded-Host {http.request.host}
          header_up X-Forwarded-For {http.request.remote.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 120s
          }
        }
      }

      @grafana_all path /grafana /grafana/ /grafana/*
      handle @grafana_all {
        @grafana_noslash path /grafana
        redir @grafana_noslash /grafana/ 308
        reverse_proxy http://grafana.observability.svc.cluster.local:3000 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Forwarded-Host {http.request.host}
          header_up X-Forwarded-For {http.request.remote.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          flush_interval -1
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 180s
          }
        }
      }

      @prometheus_all path /prometheus /prometheus/ /prometheus/*
      handle @prometheus_all {
        @prometheus_noslash path /prometheus
        redir @prometheus_noslash /prometheus/ 308
        @prometheus_head_root {
          method HEAD
          path /prometheus/
        }
        respond @prometheus_head_root 200
        reverse_proxy http://prometheus.observability.svc.cluster.local:9090 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Forwarded-Host {http.request.host}
          header_up X-Forwarded-For {http.request.remote.host}
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 120s
          }
        }
      }

      # WebSocket realtime (api-gateway). Must not fall through to Next.js nginx.
      @ws path /ws /ws/*
      handle @ws {
        reverse_proxy http://api-gateway.off-campus-housing-tracker.svc.cluster.local:4020 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Request-Id {http.request.header.X-Request-Id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          flush_interval -1
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 3600s
            read_buffer 32MiB
            write_buffer 32MiB
            keepalive 2m
            keepalive_interval 30s
            keepalive_idle_conns 256
            keepalive_idle_conns_per_host 64
          }
        }
      }

      # NOTE: Do not route bare `/listings/*` here — Next.js serves HTML at `/listings` and `/listings/{uuid}`.
      # Listings HTTP API is under `/api/listings/*` (covered by `/api/*`).
      @api {
        path /api/* /auth/* /booking/* /bookings/* /messaging/* /analytics/* /insights/* /trust/* /media/* /notification/*
        not header Content-Type application/grpc*
      }
      handle @api {
        # Advertise HTTP/3 on API responses (browser upgrade); Caddy also negotiates QUIC on UDP/443.
        header alt-svc "h3=\":443\"; ma=2592000"
        encode gzip zstd
        reverse_proxy http://api-gateway.off-campus-housing-tracker.svc.cluster.local:4020 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Request-Id {http.request.header.X-Request-Id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          header_up X-OCH-Edge-Proto {http.request.header.X-OCH-Edge-Proto}
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 300s
            expect_continue_timeout 5s
            read_buffer 32MiB
            write_buffer 32MiB
            keepalive 2m
            keepalive_interval 30s
            keepalive_idle_conns 256
            keepalive_idle_conns_per_host 64
          }
          lb_policy round_robin
          health_uri /healthz
          health_interval 30s
          health_timeout 5s
          fail_duration 30s
          max_fails 3
        }
      }

      # Web / static: explicit catch-all to web frontend via nginx.
      @web path /*
      handle @web {
        reverse_proxy http://nginx.off-campus-housing-tracker.svc.cluster.local:8080 {
          header_up Host {http.request.host}
          header_up X-Forwarded-Proto https
          header_up X-Request-Id {http.request.id}
          header_up traceparent {http.request.header.traceparent}
          header_up tracestate {http.request.header.tracestate}
          header_up baggage {http.request.header.baggage}
          transport http {
            versions h1 h2
            dial_timeout 10s
            response_header_timeout 30s
          }
        }
      }
    }

    :443 {
      tls /etc/caddy/certs/tls.crt /etc/caddy/certs/tls.key {
        protocols tls1.2 tls1.3
        ciphers TLS_AES_128_GCM_SHA256 TLS_AES_256_GCM_SHA384 TLS_CHACHA20_POLY1305_SHA256
      }

      handle_path /_caddy/healthz {
        header {
          alt-svc "h3=\":443\"; ma=2592000"
        }
        respond "ok" 200
      }

      handle {
        respond "Misdirected Request" 421
      }
    }
