# Caddy HTTP/3 service (LoadBalancer). Use with MetalLB; nodePort 30443 for HTTP/2 and HTTP/3 (QUIC).
# Apply when METALLB_ENABLED=1. Requires MetalLB pool + L2 (scripts/install-metallb.sh).
apiVersion: v1
kind: Service
metadata:
  name: caddy-h3
  namespace: ingress-nginx
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: caddy-h3
  ports:
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
    nodePort: 30443
  - name: https-udp
    port: 443
    targetPort: 443
    protocol: UDP
    nodePort: 30443
  - name: grpc-h2c
    port: 5000
    targetPort: 5000
    protocol: TCP
  - name: admin
    port: 2019
    targetPort: 2019
    protocol: TCP
