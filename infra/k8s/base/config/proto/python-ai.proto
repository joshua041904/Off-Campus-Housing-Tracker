syntax = "proto3";

package python_ai;

option go_package = "github.com/yourorg/record-platform/proto/python-ai";

// Python AI service for gRPC (AI predictions, chatbot, price trends)
service PythonAIService {
  // Price prediction
  rpc PredictPrice(PredictPriceRequest) returns (PredictPriceResponse);
  
  // Get price trends
  rpc GetPriceTrends(GetPriceTrendsRequest) returns (GetPriceTrendsResponse);
  
  // Get recommendations
  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
  
  // Get trending items
  rpc GetTrending(GetTrendingRequest) returns (GetTrendingResponse);
  
  // Chatbot interface
  rpc Chat(ChatRequest) returns (ChatResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Price prediction
message PredictPriceRequest {
  repeated PriceItem items = 1;
}

message PriceItem {
  string query = 1;
  double base_price = 2;
  string record_grade = 3;
  string sleeve_grade = 4;
  bool promo = 5;
  double anniversary_boost = 6;
}

message PredictPriceResponse {
  double suggested = 1;
  double local_suggested = 2;
  double analytics_suggested = 3;
  int32 samples = 4;
  repeated double estimates = 5;
  int32 t_ms = 6;
}

// Price trends
message GetPriceTrendsRequest {
  string query = 1;
}

message GetPriceTrendsResponse {
  string query = 1;
  int32 count = 2;
  double low = 3;
  double p50 = 4;
  double high = 5;
  repeated string discogs_titles = 6;
}

// Recommendations
message GetRecommendationsRequest {
  string query = 1;
  string user_id = 2;
  int32 limit = 3;
}

message GetRecommendationsResponse {
  string query = 1;
  repeated Recommendation recommendations = 2;
  string source = 3;
}

message Recommendation {
  string query = 1;
  int32 count = 2;
  double similarity = 3;
}

// Trending
message GetTrendingRequest {
  int32 days = 1;
  int32 limit = 2;
}

message GetTrendingResponse {
  int32 days = 1;
  repeated TrendingItem trending = 2;
  string source = 3;
}

message TrendingItem {
  string query = 1;
  int32 count = 2;
}

// Chat
message ChatRequest {
  string message = 1;
  string user_id = 2;
  string context = 3;
}

message ChatResponse {
  string message = 1;
  string response = 2;
  map<string, string> analytics_context = 3;
  int64 timestamp = 4;
}

// Health check
message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
}

