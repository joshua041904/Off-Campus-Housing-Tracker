syntax = "proto3";

package auction_monitor;

option go_package = "github.com/yourorg/record-platform/proto/auction-monitor";

// Auction Monitor service for gRPC (Auction tracking, price monitoring)
service AuctionMonitorService {
  // Get monitored auctions
  rpc GetMonitoredAuctions(GetMonitoredAuctionsRequest) returns (GetMonitoredAuctionsResponse);
  
  // Get auction results
  rpc GetAuctionResults(GetAuctionResultsRequest) returns (GetAuctionResultsResponse);
  
  // Start monitoring a query
  rpc StartMonitoring(StartMonitoringRequest) returns (StartMonitoringResponse);
  
  // Stop monitoring
  rpc StopMonitoring(StopMonitoringRequest) returns (StopMonitoringResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Get monitored auctions
message GetMonitoredAuctionsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetMonitoredAuctionsResponse {
  repeated MonitoredAuction auctions = 1;
  int32 count = 2;
}

message MonitoredAuction {
  string id = 1;
  string user_id = 2;
  string source = 3;
  string query = 4;
  string created_at = 5;
  int32 result_count = 6;
  string last_updated = 7;
}

// Get auction results
message GetAuctionResultsRequest {
  string watchlist_id = 1;
  string user_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message GetAuctionResultsResponse {
  string watchlist_id = 1;
  repeated AuctionResult results = 2;
  int32 count = 3;
}

message AuctionResult {
  string id = 1;
  string source = 2;
  string external_id = 3;
  string title = 4;
  double price = 5;
  double total_cost = 6;
  string currency = 7;
  double shipping_cost = 8;
  string sold_at = 9;
  string auction_url = 10;
  string image_url = 11;
  string created_at = 12;
}

// Start monitoring
message StartMonitoringRequest {
  string user_id = 1;
  string query = 2;
  string source = 3;
}

message StartMonitoringResponse {
  bool ok = 1;
  string message = 2;
  MonitoredAuction watchlist = 3;
}

// Stop monitoring
message StopMonitoringRequest {
  string user_id = 1;
  string watchlist_id = 2;
}

message StopMonitoringResponse {
  bool ok = 1;
  string message = 2;
}

// Health check
message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string version = 2;
  bool db_ready = 3;
  bool kafka_ready = 4;
}

