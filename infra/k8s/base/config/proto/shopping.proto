syntax = "proto3";

package shopping;

option go_package = "github.com/yourorg/record-platform/proto/shopping";

// Shopping/Collector service for gRPC
service ShoppingService {
  // Shopping Cart operations
  rpc AddToCart(AddToCartRequest) returns (AddToCartResponse);
  rpc RemoveFromCart(RemoveFromCartRequest) returns (RemoveFromCartResponse);
  rpc UpdateCartItem(UpdateCartItemRequest) returns (UpdateCartItemResponse);
  rpc GetCart(GetCartRequest) returns (GetCartResponse);
  rpc ClearCart(ClearCartRequest) returns (ClearCartResponse);
  
  // Watchlist operations
  rpc AddToWatchlist(AddToWatchlistRequest) returns (AddToWatchlistResponse);
  rpc RemoveFromWatchlist(RemoveFromWatchlistRequest) returns (RemoveFromWatchlistResponse);
  rpc GetWatchlist(GetWatchlistRequest) returns (GetWatchlistResponse);
  
  // Recently Viewed operations
  rpc AddRecentlyViewed(AddRecentlyViewedRequest) returns (AddRecentlyViewedResponse);
  rpc GetRecentlyViewed(GetRecentlyViewedRequest) returns (GetRecentlyViewedResponse);
  
  // Wishlist operations
  rpc AddToWishlist(AddToWishlistRequest) returns (AddToWishlistResponse);
  rpc RemoveFromWishlist(RemoveFromWishlistRequest) returns (RemoveFromWishlistResponse);
  rpc UpdateWishlistItem(UpdateWishlistItemRequest) returns (UpdateWishlistItemResponse);
  rpc GetWishlist(GetWishlistRequest) returns (GetWishlistResponse);
  
  // Purchase History operations
  rpc AddPurchase(AddPurchaseRequest) returns (AddPurchaseResponse);
  rpc GetPurchaseHistory(GetPurchaseHistoryRequest) returns (GetPurchaseHistoryResponse);
  
  // Search History operations
  rpc AddSearch(AddSearchRequest) returns (AddSearchResponse);
  rpc GetSearchHistory(GetSearchHistoryRequest) returns (GetSearchHistoryResponse);
  rpc GetTrendingSearches(GetTrendingSearchesRequest) returns (GetTrendingSearchesResponse);
  
  // Cache operations (LFU/LRU)
  rpc GetCacheStats(GetCacheStatsRequest) returns (GetCacheStatsResponse);
  rpc EvictCache(EvictCacheRequest) returns (EvictCacheResponse);
  
  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

// Shopping Cart messages
message AddToCartRequest {
  string user_id = 1;
  string item_type = 2; // 'listing', 'record', 'custom'
  string item_id = 3;
  int32 quantity = 4;
  optional string listing_id = 5;
  optional double price = 6;
  optional string metadata = 7; // JSON string
}

message AddToCartResponse {
  bool success = 1;
  string cart_item_id = 2;
  string message = 3;
}

message RemoveFromCartRequest {
  string user_id = 1;
  string cart_item_id = 2;
}

message RemoveFromCartResponse {
  bool success = 1;
  string message = 2;
}

message UpdateCartItemRequest {
  string user_id = 1;
  string cart_item_id = 2;
  optional int32 quantity = 3;
  optional double price = 4;
}

message UpdateCartItemResponse {
  bool success = 1;
  string message = 2;
}

message GetCartRequest {
  string user_id = 1;
}

message GetCartResponse {
  repeated CartItem items = 1;
  int32 total_items = 2;
  double total_price = 3;
}

message CartItem {
  string id = 1;
  string item_type = 2;
  string item_id = 3;
  string listing_id = 4;
  int32 quantity = 5;
  double price = 6;
  string metadata = 7; // JSON string
  string created_at = 8;
  string updated_at = 9;
}

message ClearCartRequest {
  string user_id = 1;
}

message ClearCartResponse {
  bool success = 1;
  int32 items_removed = 2;
}

// Watchlist messages
message AddToWatchlistRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
  optional string listing_id = 4;
  repeated string notify_on = 5; // ['price_drop', 'availability', 'bid_end']
  optional string metadata = 6; // JSON string
}

message AddToWatchlistResponse {
  bool success = 1;
  string watchlist_id = 2;
  string message = 3;
}

message RemoveFromWatchlistRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
}

message RemoveFromWatchlistResponse {
  bool success = 1;
  string message = 2;
}

message GetWatchlistRequest {
  string user_id = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
}

message GetWatchlistResponse {
  repeated WatchlistItem items = 1;
  int32 total = 2;
}

message WatchlistItem {
  string id = 1;
  string item_type = 2;
  string item_id = 3;
  string listing_id = 4;
  repeated string notify_on = 5;
  string metadata = 6; // JSON string
  string created_at = 7;
}

// Recently Viewed messages
message AddRecentlyViewedRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
  optional string metadata = 4; // JSON string
}

message AddRecentlyViewedResponse {
  bool success = 1;
}

message GetRecentlyViewedRequest {
  string user_id = 1;
  optional string item_type = 2;
  optional int32 limit = 3;
}

message GetRecentlyViewedResponse {
  repeated RecentlyViewedItem items = 1;
}

message RecentlyViewedItem {
  string item_type = 2;
  string item_id = 3;
  string viewed_at = 4;
  string metadata = 5; // JSON string
}

// Wishlist messages
message AddToWishlistRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
  optional string listing_id = 4;
  optional int32 priority = 5;
  optional string notes = 6;
  optional string metadata = 7; // JSON string
}

message AddToWishlistResponse {
  bool success = 1;
  string wishlist_id = 2;
}

message RemoveFromWishlistRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
}

message RemoveFromWishlistResponse {
  bool success = 1;
}

message UpdateWishlistItemRequest {
  string user_id = 1;
  string item_type = 2;
  string item_id = 3;
  optional int32 priority = 4;
  optional string notes = 5;
}

message UpdateWishlistItemResponse {
  bool success = 1;
}

message GetWishlistRequest {
  string user_id = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
}

message GetWishlistResponse {
  repeated WishlistItem items = 1;
  int32 total = 2;
}

message WishlistItem {
  string id = 1;
  string item_type = 2;
  string item_id = 3;
  string listing_id = 4;
  int32 priority = 5;
  string notes = 6;
  string metadata = 7; // JSON string
  string created_at = 8;
}

// Purchase History messages
message AddPurchaseRequest {
  string user_id = 1;
  string order_id = 2;
  string item_type = 3;
  string item_id = 4;
  optional string listing_id = 5;
  int32 quantity = 6;
  double price_paid = 7;
  string currency = 8;
  string purchase_type = 9; // 'buy_now', 'auction_win', 'best_offer'
  string status = 10; // 'completed', 'pending', 'cancelled', 'refunded'
  optional string metadata = 11; // JSON string
}

message AddPurchaseResponse {
  bool success = 1;
  string purchase_id = 2;
}

message GetPurchaseHistoryRequest {
  string user_id = 1;
  optional int32 limit = 2;
  optional int32 offset = 3;
}

message GetPurchaseHistoryResponse {
  repeated PurchaseItem items = 1;
  int32 total = 2;
}

message PurchaseItem {
  string id = 1;
  string order_id = 2;
  string item_type = 3;
  string item_id = 4;
  string listing_id = 5;
  int32 quantity = 6;
  double price_paid = 7;
  string currency = 8;
  string purchase_type = 9;
  string status = 10;
  string purchased_at = 11;
  string metadata = 12; // JSON string
}

// Search History messages
message AddSearchRequest {
  string user_id = 1;
  string query = 2;
  string query_type = 3; // 'listing', 'record', 'user', 'forum'
  optional string filters = 4; // JSON string
  optional int32 result_count = 5;
  optional string clicked_item = 6;
}

message AddSearchResponse {
  bool success = 1;
}

message GetSearchHistoryRequest {
  string user_id = 1;
  optional string query_type = 2;
  optional int32 limit = 3;
}

message GetSearchHistoryResponse {
  repeated SearchItem items = 1;
}

message SearchItem {
  string id = 1;
  string query = 2;
  string query_type = 3;
  string filters = 4; // JSON string
  int32 result_count = 5;
  string clicked_item = 6;
  string searched_at = 7;
}

message GetTrendingSearchesRequest {
  optional string query_type = 1;
  optional int32 limit = 2;
  optional string time_range = 3; // '1h', '24h', '7d', '30d'
}

message GetTrendingSearchesResponse {
  repeated TrendingSearch items = 1;
}

message TrendingSearch {
  string query = 1;
  string query_type = 2;
  int32 count = 3;
}

// Cache messages
message GetCacheStatsRequest {
  string user_id = 1;
  optional string cache_type = 2; // 'lfu', 'lru'
}

message GetCacheStatsResponse {
  int32 lfu_items = 1;
  int32 lru_items = 2;
  int32 total_access_count = 3;
}

message EvictCacheRequest {
  string user_id = 1;
  string cache_type = 2; // 'lfu', 'lru'
  int32 max_items = 3;
}

message EvictCacheResponse {
  bool success = 1;
  int32 items_evicted = 2;
}

// Health check
message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

