apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: off-campus-housing
resources:
  - app-config.yaml
  - app-secrets.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: proto-files
    files:
      # Synced from repo root proto/ — source of truth is repo proto/. Update with: cp ../../../../proto/*.proto proto/
      - common.proto=proto/common.proto
      - health.proto=proto/health.proto
      - auth.proto=proto/auth.proto
      - listings.proto=proto/listings.proto
      - booking.proto=proto/booking.proto
      - messaging.proto=proto/messaging.proto
      - notification.proto=proto/notification.proto
      - trust.proto=proto/trust.proto
      - analytics.proto=proto/analytics.proto
