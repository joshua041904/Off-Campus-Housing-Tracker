apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  JWT_SECRET: change_me_super_secret

  # Redis password. Leave empty when Redis is externalized without auth (e.g. Docker Compose redis:6379).
  # When set, services send AUTH; Redis without requirepass returns "AUTH called without any password configured".
  REDIS_PASSWORD: ""

  # Optional integrations – leave blank or fill in
  DISCOGS_CONSUMER_KEY: ""
  DISCOGS_CONSUMER_SECRET: ""
  DISCOGS_TOKEN: ""
  EBAY_CLIENT_ID: ""
  EBAY_CLIENT_SECRET: ""
  EBAY_OAUTH_TOKEN: ""

  # S3/R2
  S3_ENDPOINT: ""
  S3_ACCESS_KEY_ID: ""
  S3_SECRET_ACCESS_KEY: ""

  # Auth Service - OAuth, MFA, Verification
  # Google OAuth (required for OAuth features)
  # See OAUTH_SETUP_GUIDE.md for detailed setup instructions
  # Get credentials from: https://console.cloud.google.com/
  GOOGLE_CLIENT_ID: ""  # Replace with your Google OAuth Client ID from Google Cloud Console
  GOOGLE_CLIENT_SECRET: ""  # Replace with your Google OAuth Client Secret from Google Cloud Console
  GOOGLE_CALLBACK_URL: ""  # Must match Google Console OAuth client redirect URI (e.g., https://your-domain.com/api/auth/google/callback)
  FRONTEND_URL: ""  # Where to redirect after OAuth (your frontend URL, e.g., https://your-domain.com)

  # SMTP — dev default below is Mailpit/MailHog capture (not a real inbox).
  # Production-like: point at a real relay and set EMAIL_DELIVERY_MODE=self_hosted_smtp or provider in app-config (or rely on auto
  # when host is not mailpit/mailhog and port is not 1025). Examples (use vendor docs for exact auth):
  #   SendGrid: SMTP_HOST=smtp.sendgrid.net SMTP_PORT=587 SMTP_USER=apikey SMTP_PASSWORD=<API_KEY> SMTP_FROM=<verified sender>
  #   SES SMTP:   region-specific host, IAM SMTP credentials, TLS 587 or 465.
  #   Postmark:   SMTP_HOST=smtp.postmarkapp.com SMTP_PORT=587 SMTP_USER=<server token> SMTP_PASSWORD=<server token>
  SMTP_HOST: "host.docker.internal"
  SMTP_PORT: "1025"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@off-campus-housing-tracker.local"

  # SMS Providers - Choose ONE (or use mock for development)
  
  # Option 1: Twilio (Free trial available)
  # Get credentials from: https://console.twilio.com/
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""

  # Self-hosted SMS gateway (messaging-service POSTs JSON { to, body } when SMS_DELIVERY_MODE=self_hosted_gateway).
  # SMS_SELF_HOSTED_TOKEN optional Bearer value.
  SMS_SELF_HOSTED_URL: ""
  SMS_SELF_HOSTED_TOKEN: ""

  # Option 2: AWS SNS (Very cheap: ~$0.00645 per SMS)
  # Get credentials from: https://console.aws.amazon.com/iam/
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"

  # Option 4: MessageBird (FREE tier: 1,000 SMS/month)
  # Get credentials from: https://dashboard.messagebird.com/
  MESSAGEBIRD_API_KEY: ""
  MESSAGEBIRD_ORIGINATOR: ""

  # listings-service → booking-service internal: overlapping bookings exclude listing IDs from search.
  # Must be identical in booking-service and listings-service (both load app-secrets). Rotate in prod.
  BOOKING_LISTINGS_INTERNAL_SECRET: "och_dev_booking_listings_internal_rotate_in_prod"
