apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production
  ALLOW_MOCK_PASSKEY_DATA: "false"  # Production mode - requires real WebAuthn data (set to "true" for testing)
  WEBAUTHN_RP_ID: "off-campus-housing.test"  # Relying Party ID (your domain)
  WEBAUTHN_ORIGIN: "https://off-campus-housing.test"  # WebAuthn origin (must match browser origin; use :8443 only if you terminate TLS there)
  
  # SMS Provider Configuration
  # Using Mock SMS Provider (FREE - like MailHog for email)
  # Perfect for development/testing - no external services needed
  # Access sent messages via: GET /api/auth/sms/mock/messages
  SMS_PROVIDER: "mock"  # Mock provider - FREE, works immediately, no setup needed
  SMS_USE_MOCK: "true"  # Force mock mode (FREE - logs to console, accessible via API)
  NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080

  GATEWAY_PORT: "4020"
  # api-gateway → auth-service gRPC (strict mTLS; mount service-tls at /etc/certs)
  AUTH_GRPC_TARGET: "auth-service.off-campus-housing-tracker.svc.cluster.local:50061"
  AUTH_PORT: "4011"
  RECORDS_PORT: "4002"
  LISTINGS_PORT: "4003"
  ANALYTICS_PORT: "4004"
  AI_PORT: "5005"
  SHOPPING_PORT: "4007"

  # Redis URL (Docker Compose Redis has NO password configured)
  REDIS_URL: redis://host.docker.internal:6380/0

  PROTO_ROOT: /app/proto

  # Canonical externalized DB (no hostAliases). Build URLs as postgres://user:pass@${DATABASE_HOST}:${PORT}/dbname.
  # Colima: DATABASE_HOST=host.lima.internal. Docker Desktop: host.docker.internal. Override in overlay if needed.
  DATABASE_HOST: host.docker.internal
  AUTH_DB_PORT: "5441"
  LISTINGS_DB_PORT: "5442"
  BOOKINGS_DB_PORT: "5443"
  MESSAGING_DB_PORT: "5444"
  NOTIFICATION_DB_PORT: "5445"
  TRUST_DB_PORT: "5446"
  ANALYTICS_DB_PORT: "5447"
  # Full URLs (for services that read single env); prefer building from DATABASE_HOST + *_DB_PORT where possible.
  DATABASE_URL:         postgresql://postgres:postgres@host.docker.internal:5441/auth?connect_timeout=5
  POSTGRES_URL:         postgresql://postgres:postgres@host.docker.internal:5441/auth?connect_timeout=5
  POSTGRES_URL_AUTH:        postgresql://postgres:postgres@host.docker.internal:5441/auth?connect_timeout=5
  POSTGRES_URL_LISTINGS:    postgresql://postgres:postgres@host.docker.internal:5442/listings?connect_timeout=5
  POSTGRES_URL_BOOKINGS:    postgresql://postgres:postgres@host.docker.internal:5443/bookings?connect_timeout=5
  POSTGRES_URL_MESSAGING:   postgresql://postgres:postgres@host.docker.internal:5444/messaging?connect_timeout=5
  POSTGRES_URL_NOTIFICATION: postgresql://postgres:postgres@host.docker.internal:5445/notification?connect_timeout=5
  POSTGRES_URL_TRUST:       postgresql://postgres:postgres@host.docker.internal:5446/trust?connect_timeout=5
  POSTGRES_URL_ANALYTICS:   postgresql://postgres:postgres@host.docker.internal:5447/analytics?connect_timeout=10
  POSTGRES_URL_MEDIA:       postgresql://postgres:postgres@host.docker.internal:5448/media?connect_timeout=10
  
  # Kafka: strict TLS only (no plaintext/cleartext). All client connections use port 9093 (SSL).
  # Broker PLAINTEXT is bound to 127.0.0.1 only (healthcheck); clients must use SSL.
  # Required when KAFKA_SSL_ENABLED=true: set KAFKA_CA_CERT to path to CA PEM (e.g. kafka-ssl-secret).
  # Optional mTLS: KAFKA_CLIENT_CERT, KAFKA_CLIENT_KEY. Mount certs via Secret and set env in deployment.
  # Default bootstrap: KRaft headless seeds via Service kafka (pod DNS: kafka-N.kafka).
  # Comma-separated list; services/common/src/kafka.ts splits KAFKA_BROKER into multiple seeds.
  # Optional legacy overlay (kafka-external → host broker): infra/k8s/overlays/kafka-host-compose/
  KAFKA_BROKER: "kafka-0.kafka:9093,kafka-1.kafka:9093,kafka-2.kafka:9093"
  KAFKA_USE_SSL: "true"
  KAFKA_SSL_ENABLED: "true"
  # Listings: do not block 201 on Kafka ack (reduces H2 multiplexing tail latency). Errors logged; use ANALYTICS_SYNC_MODE=1 for immediate metrics in dev/E2E.
  LISTINGS_KAFKA_AWAIT_PUBLISH: "false"
  # Topic prefix for domain event topics: ${ENV_PREFIX}.booking.events, etc. Use dev/staging/prod; no hardcoded env in code.
  ENV_PREFIX: "dev"
  # In-cluster HTTP base for api-gateway proxy (optional override; gateway has same default).
  NOTIFICATION_HTTP: "http://notification-service.off-campus-housing-tracker.svc.cluster.local:4015"
  # Cross-service HTTP (pods resolve cluster DNS). Used by analytics/booking/messaging for listing lookup + saves.
  LISTINGS_HTTP: "http://listings-service.off-campus-housing-tracker.svc.cluster.local:4012"
  BOOKING_HTTP: "http://booking-service.off-campus-housing-tracker.svc.cluster.local:4013"

  # analytics-service listing-feel: HTTP to Ollama. In-cluster pods use Linux binaries (no Apple Metal).
  # For Metal on Apple Silicon: run `ollama serve` on the Mac and apply overlays/dev/patches/analytics-service-ollama-host-metal.yaml
  # so analytics uses OLLAMA_BASE_URL=http://host.docker.internal:11434 (see scripts/colima-apply-host-aliases.sh).
  OLLAMA_BASE_URL: "http://ollama.off-campus-housing-tracker.svc.cluster.local:11434"
  OLLAMA_MODEL: "llama3.2:1b"
  # Optional larger model (CPU-heavy on Colima): "llama3.2:3b" — raise ollama Deployment CPU/memory + init pull timeout.
  # Keep llama.cpp runner loaded after idle so first /api/generate is not a full 30–60s model boot (listing-feel + gateway timeouts).
  OLLAMA_KEEP_ALIVE: "10m"
  OLLAMA_LOAD_TIMEOUT: "5m"
  OLLAMA_NUM_PARALLEL: "2"
  OLLAMA_MAX_QUEUE: "16"

  # analytics-service listing-feel: stable defaults (700 predict + 2048 ctx); raise timeout locally if Colima is slow.
  ANALYTICS_LISTING_FEEL_NUM_PREDICT: "700"
  ANALYTICS_LISTING_FEEL_TEMPERATURE: "0.45"
  ANALYTICS_LISTING_FEEL_NUM_CTX: "2048"
  ANALYTICS_LISTING_FEEL_TOP_P: "0.9"
  ANALYTICS_LISTING_FEEL_REPEAT_PENALTY: "1.15"
  ANALYTICS_OLLAMA_TIMEOUT_MS: "300000"
  ANALYTICS_OLLAMA_RETRIES: "1"
  # Structured JSON listing intelligence (modes, depth, optional ensemble). Legacy bullet path when unset/0.
  ANALYTICS_LISTING_INTELLIGENCE_V2: "1"
  # Listing Intelligence v2 sampling (listed-feel legacy ANALYTICS_LISTING_FEEL_* applies to bullet path only).
  # Lower default for stabler JSON (override per env); legacy bullet path uses ANALYTICS_LISTING_FEEL_*.
  ANALYTICS_LI_V2_TEMPERATURE: "0.48"
  ANALYTICS_LI_V2_TOP_P: "0.9"
  ANALYTICS_LI_V2_FREQUENCY_PENALTY: "0.4"
  ANALYTICS_LI_V2_PRESENCE_PENALTY: "0.3"
  # Comma-separated Ollama tags for parallel ensemble (requires ANALYTICS_ENSEMBLE_ENABLED=1 and 2+ models pulled).
  # ANALYTICS_ENSEMBLE_MODELS: "llama3.2:1b,mistral:7b"
  # ANALYTICS_ENSEMBLE_ENABLED: "0"
  # ANALYTICS_META_EVAL: "0"

  # OpenTelemetry → Jaeger (OTLP HTTP). In pods, `KUBERNETES_SERVICE_HOST` is set, so the shared SDK
  # defaults to the in-cluster Jaeger Service unless you override or disable it.
  # Jaeger: observability namespace, OTLP HTTP 4318 (see infra/k8s/base/observability/jaeger-deploy.yaml).
  # Query UI: https://off-campus-housing.test/jaeger (Caddy → jaeger:16686; QUERY_BASE_PATH=/jaeger) or MetalLB http://<ip>:16686.
  # Fallback laptop: kubectl -n observability port-forward svc/jaeger 16686:16686 → http://127.0.0.1:16686
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger.observability.svc.cluster.local:4318"
  # W3C tracecontext+baggage are configured in code (CompositePropagator). OTEL_PROPAGATORS is documented for operators / autoinstrumentation parity only.
  OTEL_PROPAGATORS: "tracecontext,baggage"
  # Jaeger Step7 / load labs: sample every root trace so downstream gRPC/Kafka spans are not dropped by ratio sampling.
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  # Optional: MetalLB (or other LB) IP/hostname if processes must reach Jaeger outside cluster DNS:
  # OCH_JAEGER_OTLP_HOST: "<metallb-ip>"
  # Opt-in laptop docker-compose Jaeger (not for in-cluster): OCH_OTEL_LOCAL_JAEGER=1
  # Skip cluster default when you only want console or a custom endpoint: OCH_OTEL_DISABLE_CLUSTER_JAEGER=1
