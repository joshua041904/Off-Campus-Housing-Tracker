# Envoy gRPC proxy: Caddy (h2c) -> Envoy :10000 -> OCH gRPC backends only (mTLS).
# Clusters: auth, messaging, listings, analytics, booking, notification, trust. Upstream SNI: off-campus-housing.test (dev leaf SAN).
# Admin on :15000 for diagnostics: kubectl port-forward deploy/envoy-test 15000:15000; curl localhost:15000/clusters
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: envoy-test
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 15000
    static_resources:
      listeners:
      - name: listener_0
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 10000
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: grpc_json
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: local_service
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/grpc.health.v1.Health/"
                    route:
                      cluster: auth_service
                      timeout: 15s
                  - match:
                      prefix: "/auth."
                    route:
                      cluster: auth_service
                      timeout: 15s
                  - match:
                      prefix: "/messaging."
                    route:
                      cluster: messaging_service
                      timeout: 15s
                  - match:
                      prefix: "/listings."
                    route:
                      cluster: listings_service
                      timeout: 15s
                  - match:
                      prefix: "/analytics."
                    route:
                      cluster: analytics_service
                      timeout: 15s
                  - match:
                      prefix: "/booking."
                    route:
                      cluster: booking_service
                      timeout: 15s
                  - match:
                      prefix: "/notification."
                    route:
                      cluster: notification_service
                      timeout: 15s
                  - match:
                      prefix: "/trust."
                    route:
                      cluster: trust_service
                      timeout: 15s
                  - match:
                      prefix: "/"
                    route:
                      cluster: auth_service
                      timeout: 15s
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: auth_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: auth_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: auth-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50061
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
                  filename: /etc/certs/ca/dev-root.pem
      - name: messaging_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: messaging_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: messaging-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50064
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
                  filename: /etc/certs/ca/dev-root.pem
      - name: listings_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: listings_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: listings-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50062
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
                  filename: /etc/certs/ca/dev-root.pem
      - name: booking_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
