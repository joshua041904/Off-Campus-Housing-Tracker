        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: analytics_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: analytics-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50067
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
