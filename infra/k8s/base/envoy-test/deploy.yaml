---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-ca-cert
  namespace: envoy-test
data:
  dev-root.pem: |
    # Populated from dev-root-ca secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-test
  namespace: envoy-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envoy-test
  template:
    metadata:
      labels:
        app: envoy-test
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - containerPort: 10000
          name: grpc
        - containerPort: 15000
          name: admin
        command:
        - /usr/local/bin/envoy
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - envoy-test
        - --service-node
        - envoy-test
        - --log-level
        - info
        volumeMounts:
        - name: envoy-config
          mountPath: /etc/envoy
        - name: ca-cert
          mountPath: /etc/certs/ca
          readOnly: true
        - name: envoy-client
          mountPath: /etc/certs/client
          readOnly: true
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-config
      - name: ca-cert
        secret:
          secretName: dev-root-ca
          items:
          - key: dev-root.pem
            path: dev-root.pem
      - name: envoy-client
        secret:
          secretName: envoy-client-tls
          items:
          - key: envoy.crt
            path: envoy.crt
          - key: envoy.key
            path: envoy.key
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-test
  namespace: envoy-test
spec:
  type: ClusterIP
  ports:
  - port: 10000
    targetPort: 10000
    protocol: TCP
    name: grpc
  - port: 15000
    targetPort: 15000
    protocol: TCP
    name: admin
  selector:
    app: envoy-test
