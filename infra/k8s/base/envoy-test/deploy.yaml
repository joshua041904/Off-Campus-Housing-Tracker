          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: booking_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: booking-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50063
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
                  filename: /etc/certs/ca/dev-root.pem
      - name: notification_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: notification_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: notification-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50065
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
                  filename: /etc/certs/ca/dev-root.pem
      - name: trust_service
        connect_timeout: 15s
        type: LOGICAL_DNS
        lb_policy: ROUND_ROBIN
        http2_protocol_options: {}
        health_checks:
        - timeout: 2s
          interval: 5s
          unhealthy_threshold: 2
          healthy_threshold: 2
          grpc_health_check: {}
        load_assignment:
          cluster_name: trust_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: trust-service.off-campus-housing-tracker.svc.cluster.local
                    port_value: 50066
        transport_socket:
          name: envoy.transport_sockets.tls
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
            sni: off-campus-housing.test
            common_tls_context:
              tls_certificates:
              - certificate_chain:
                  filename: /etc/certs/client/envoy.crt
                private_key:
                  filename: /etc/certs/client/envoy.key
              validation_context:
                trusted_ca:
