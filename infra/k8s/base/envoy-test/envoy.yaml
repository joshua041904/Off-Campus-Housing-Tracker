static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 10000
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: grpc_json
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              # Route by gRPC path prefix (e.g. /auth.AuthService/Register, /booking.BookingService/GetBooking)
              - match:
                  prefix: "/auth."
                route:
                  cluster: auth_service
              - match:
                  prefix: "/records."
                route:
                  cluster: records_service
              - match:
                  prefix: "/messaging."
                route:
                  cluster: messaging_service
              - match:
                  prefix: "/listings."
                route:
                  cluster: listings_service
              - match:
                  prefix: "/analytics."
                route:
                  cluster: analytics_service
              - match:
                  prefix: "/shopping."
                route:
                  cluster: shopping_service
              - match:
                  prefix: "/booking."
                route:
                  cluster: booking_service
              - match:
                  prefix: "/notification."
                route:
                  cluster: notification_service
              - match:
                  prefix: "/trust."
                route:
                  cluster: trust_service
              - match:
                  safe_regex:
                    regex: "^/(auction_monitor|auction-monitor)\\."
                route:
                  cluster: auction_monitor_service
              - match:
                  safe_regex:
                    regex: "^/(python_ai|python-ai)\\."
                route:
                  cluster: python_ai_service
              # Default route (fallback to auth for backward compatibility)
              - match:
                  prefix: "/"
                route:
                  cluster: auth_service
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
  # Auth Service (port 50051)
  - name: auth_service
    connect_timeout: 5s
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    http2_protocol_options: {}
    load_assignment:
      cluster_name: auth_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: auth-service.off-campus-housing-tracker.svc.cluster.local
                port_value: 50051
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: off-campus-housing.test
        common_tls_context:
          validation_context:
            trusted_ca:
              filename: /etc/certs/ca/dev-root.pem
  
