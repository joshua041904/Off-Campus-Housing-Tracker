apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: off-campus-housing-tracker
  labels: { app: nginx-exporter }
spec:
  replicas: 1
  selector: { matchLabels: { app: nginx-exporter } }
  template:
    metadata:
      labels: { app: nginx-exporter }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9113"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-nginx
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                if wget -q -O- "http://nginx:8080/nginx_status" >/dev/null 2>&1; then exit 0; fi
                sleep 2
              done
              echo "nginx not ready after 60s" >&2
              exit 1
      containers:
        - name: exporter
          image: nginx/nginx-prometheus-exporter:0.11.0
          args: ["-nginx.scrape-uri=http://nginx:8080/nginx_status"]
          ports: [{ name: http, containerPort: 9113 }]
          readinessProbe:
            httpGet: { path: /metrics, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /metrics, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-exporter
  namespace: off-campus-housing-tracker
  labels: { app: nginx-exporter }
spec:
  selector: { app: nginx-exporter }
  ports: [{ name: http, port: 9113, targetPort: http }]
