apiVersion: apps/v1
kind: Deployment
metadata:
  name: listings-service
  namespace: off-campus-housing-tracker
  labels:
    app: listings-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: listings-service
  template:
    metadata:
      labels:
        app: listings-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4012"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: listings-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4012
            - name: grpc
              containerPort: 50062
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: NODE_ENV
              value: "development"
            - name: HTTP_PORT
              value: "4012"
            - name: GRPC_PORT
              value: "50062"
            - name: POSTGRES_URL_LISTINGS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_URL_LISTINGS
            - name: ENV_PREFIX
              value: "dev"
            - name: LISTING_EVENTS_TOPIC
              value: "dev.listing.events"
            - name: GRPC_REQUIRE_CLIENT_CERT
              value: "true"
            - name: TLS_CA_PATH
              value: "/etc/certs/ca.crt"
            - name: TLS_CERT_PATH
              value: "/etc/certs/tls.crt"
            - name: TLS_KEY_PATH
              value: "/etc/certs/tls.key"
            - name: KAFKA_USE_SSL
              value: "true"
            - name: KAFKA_SSL_ENABLED
              value: "true"
            - name: KAFKA_CA_CERT
              value: "/etc/kafka/secrets/ca-cert.pem"
            - name: KAFKA_CLIENT_CERT
              value: "/etc/kafka/secrets/tls.crt"
            - name: KAFKA_CLIENT_KEY
              value: "/etc/kafka/secrets/tls.key"
          volumeMounts:
            - name: service-tls
              mountPath: /etc/certs
              readOnly: true
            - name: kafka-ssl
              mountPath: /etc/kafka/secrets
              readOnly: true
          # Hardened mTLS gRPC probes: startup absorbs Kafka/DB warmup; liveness is a safety net (see docs/CA_ROTATION_AND_CLIENT_TRUST.md).
          startupProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50062
                - -service=listings.ListingsService
                - -tls
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=localhost
                - -connect-timeout=5s
                - -rpc-timeout=5s
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50062
                - -service=listings.ListingsService
                - -tls
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=localhost
                - -connect-timeout=5s
                - -rpc-timeout=5s
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50062
                - -service=listings.ListingsService
                - -tls
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=localhost
                - -connect-timeout=5s
                - -rpc-timeout=5s
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
      volumes:
        - name: service-tls
          secret:
            secretName: och-service-tls
            items:
              - key: tls.key
                path: tls.key
              - key: tls.crt
                path: tls.crt
              - key: ca.crt
                path: ca.crt
        - name: kafka-ssl
          secret:
            secretName: och-kafka-ssl-secret
            optional: true
            items:
              - key: ca-cert.pem
                path: ca-cert.pem
              - key: client.crt
                path: tls.crt
              - key: client.key
                path: tls.key
