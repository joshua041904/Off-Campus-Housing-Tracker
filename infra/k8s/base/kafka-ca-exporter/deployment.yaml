apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ca-exporter
  namespace: off-campus-housing-tracker
  labels:
    app: kafka-ca-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ca-exporter
  template:
    metadata:
      labels:
        app: kafka-ca-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9105"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kafka-ca-exporter
      containers:
        - name: exporter
          image: python:3.12-slim-bookworm
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            - name: HOUSING_NS
              value: off-campus-housing-tracker
            - name: KAFKA_CA_EXPORTER_INTERVAL
              value: "15"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              pip install --no-cache-dir -q "kubernetes>=28.0.0" "cryptography>=42.0.0" "prometheus-client>=0.20.0"
              exec python /app/exporter.py
          ports:
            - name: metrics
              containerPort: 9105
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "384Mi"
      volumes:
        - name: script
          configMap:
            name: kafka-ca-exporter-script
            items:
              - key: exporter.py
                path: exporter.py
