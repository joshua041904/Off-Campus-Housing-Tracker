apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: off-campus-housing-tracker
  labels: { app: api-gateway }
spec:
  selector: { app: api-gateway }
  ports:
    - name: http
      port: 4020
      targetPort: 4020   # must match container listen port (GATEWAY_PORT / default 4020)
