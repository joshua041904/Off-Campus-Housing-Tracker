# API Gateway: single entrypoint for REST/gRPC (port 4020 per README). Strict TLS/mTLS for gRPC to auth etc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: off-campus-housing-tracker
  labels:
    app: api-gateway
spec:
  replicas: 1
  # Cold bootstrap: /readyz stays 503 until auth-service gRPC succeeds; allow extra time vs default 600s.
  progressDeadlineSeconds: 1200
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4020"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4020
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            - name: NODE_ENV
              value: "development"
            - name: OTEL_SERVICE_NAME
              value: "api-gateway"
            - name: NODE_OPTIONS
              value: "--max-http-header-size=32768"
            - name: GATEWAY_PORT
              value: "4020"
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "1"
            # Gateway does not use Kafka; avoid common/kafka SSL cert validation at startup
            - name: KAFKA_SSL_ENABLED
              value: "false"
            # 0 = disabled. Under load lab, raise (e.g. 512) to shed with 503 instead of unbounded queueing.
            - name: GATEWAY_PROXY_MAX_INFLIGHT
              value: "0"
            # 1 = coalesce concurrent GET /daily-metrics with identical query (one upstream fetch).
            - name: GATEWAY_COALESCE_ANALYTICS_DAILY
              value: "0"
            # OCH Coverage v1: JSONL route hits in pod; run-full-matrix-local-report.sh merges into host report via kubectl-fetch-route-log.sh.
            - name: GATEWAY_ROUTE_COVERAGE_LOG
              value: "1"
            - name: GATEWAY_ROUTE_COVERAGE_FILE
              value: "/tmp/och-routes-hit.jsonl"
            # Strict policy flag for suite-labeled traffic only; unlabeled browser/user traffic is never blocked.
            - name: OCH_ENFORCE_X_SUITE
              value: "1"
            # Must exceed analytics Ollama path (listing-feel) on cold CPU-only inference.
            - name: ANALYTICS_PROXY_TIMEOUT_MS
              value: "300000"
            # Strict TLS/mTLS for gRPC to auth-service — internal leaf + CA only (secret service-tls; sync alias och-service-tls is optional).
            - name: GRPC_CA_CERT
              value: "/etc/certs/ca.crt"
            - name: GRPC_CLIENT_CERT
              value: "/etc/certs/tls.crt"
            - name: GRPC_CLIENT_KEY
              value: "/etc/certs/tls.key"
            # Optional: GRPC_SERVER_NAME for non-cluster gRPC targets. In-cluster *.svc.cluster.local uses the target host automatically (see services/common grpc-clients.ts).
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: service-tls
              mountPath: /etc/certs
              readOnly: true
          # Readiness: auth gRPC verified in-process (/readyz). Liveness: only checks HTTP stack (/healthz).
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4020
              httpHeaders:
                - name: x-traffic-class
                  value: infra
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4020
              httpHeaders:
                - name: x-traffic-class
                  value: infra
            periodSeconds: 15
            initialDelaySeconds: 20
            timeoutSeconds: 10
            failureThreshold: 6
        # Probes gateway /readyz; writes Redis key read by gateway (watchdog-throttle-poll) to tighten E2E shaper under stress.
        - name: transport-watchdog
          image: transport-watchdog:dev
          imagePullPolicy: IfNotPresent
          # Do not envFrom the full app-config here — hundreds of keys blow Node heap and OOM at 64Mi.
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef: { name: app-config, key: REDIS_URL }
            - name: TRANSPORT_WATCHDOG_GATEWAY_URL
              value: "http://127.0.0.1:4020/readyz"
            - name: TRANSPORT_WATCHDOG_INTERVAL_MS
              value: "15000"
            - name: TRANSPORT_WATCHDOG_REDIS_KEY
              value: "och:gw:watchdog_throttle"
          resources:
            requests:
              cpu: "10m"
              memory: "48Mi"
            limits:
              memory: "128Mi"
      volumes:
        - name: service-tls
          secret:
            secretName: service-tls
            items:
              - key: tls.key
                path: tls.key
              - key: tls.crt
                path: tls.crt
              - key: ca.crt
                path: ca.crt
