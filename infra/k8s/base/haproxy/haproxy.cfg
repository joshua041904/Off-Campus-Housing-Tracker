global
  log stdout format raw local0
  maxconn 5000
  tune.bufsize 32768

defaults
  mode http
  log global
  option httplog
  option http-keep-alive
  timeout connect 5s
  timeout client  60s
  timeout server  60s
  retries 3

# Explicit resolvers so health checks resolve api-gateway FQDN (init-addr none + resolvers = runtime DNS via CoreDNS)
resolvers k8s
  nameserver dns1 10.43.0.10:53
  accepted_payload_size 8192
  hold valid 10s

frontend fe_api
  bind *:8081
  http-request set-header X-Forwarded-Proto https if { ssl_fc }
  http-request set-header X-Forwarded-Proto http  if !{ ssl_fc }
  http-request set-header X-Forwarded-Host   %[req.hdr(Host)]
  default_backend be_api

# inter 3s fall 2 rise 3: avoids flap during api-gateway restarts (e.g. rotation); only mark backend down after 2 failed checks, up after 3 OK.
backend be_api
  balance leastconn
  http-reuse always
  option httpchk GET /healthz
  http-check expect status 200
  default-server inter 3s fall 2 rise 3
  server api api-gateway.record-platform.svc.cluster.local:4000 check init-addr none resolvers k8s

listen stats
  bind *:8404
  mode http
  stats enable
  stats uri /
  stats refresh 2s
