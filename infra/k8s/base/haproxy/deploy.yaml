# HAProxy: single backend — api-gateway (OCH). Config lives in ConfigMap haproxy-cm (not legacy shopping/records stacks).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy
  namespace: off-campus-housing-tracker
  labels: { app: haproxy }
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector: { matchLabels: { app: haproxy } }
  template:
    metadata:
      labels: { app: haproxy }
    spec:
      containers:
        - name: proxy
          image: haproxy:2.9
          args: ["-f","/usr/local/etc/haproxy/haproxy.cfg","-db"]
          ports:
            - { name: http,  containerPort: 8081 }
            - { name: stats, containerPort: 8404 }
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: haproxy-cm
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
      volumes:
        - name: haproxy-cm
          configMap:
            name: haproxy-cm
            items:
              - key: haproxy.cfg
                path: haproxy.cfg
