apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-cm
  namespace: off-campus-housing-tracker
data:
  haproxy.cfg: |
    # Off-Campus Housing Tracker: proxy to api-gateway only (Caddy → HAProxy → gateway :4020).
    global
      log stdout format raw local0
      # Bounded process-wide connections (avoids unbounded fan-in vs defaults).
      maxconn 4096
      tune.bufsize 32768
      # Atomic cross-pod weighted limits: Redis Lua in api-gateway (GATEWAY_CLUSTER_WEIGHT_ENABLED), not HAProxy Lua.

    defaults
      mode http
      log global
      option httplog
      option http-keep-alive
      # Raised for burst k6 / many parallel clients (was 2000; fe_api bind was 1000 — both could force RST under load).
      maxconn 8192
      timeout connect 5s
      timeout client  60s
      timeout server  60s
      retries 3

    # Explicit resolvers so health checks resolve api-gateway FQDN (init-addr none + resolvers = runtime DNS via CoreDNS)
    resolvers k8s
      nameserver dns1 10.43.0.10:53
      accepted_payload_size 8192
      hold valid 10s

    frontend fe_api
      bind *:8081 maxconn 8192
      http-request set-header X-Forwarded-Proto https if { ssl_fc }
      http-request set-header X-Forwarded-Proto http  if !{ ssl_fc }
      http-request set-header X-Forwarded-Host   %[req.hdr(Host)]
      default_backend be_api

    backend be_api
      balance leastconn
      http-reuse always
      # Match gateway K8s readiness: /readyz is 200 only after auth gRPC Health/Check succeeds
      option httpchk GET /readyz
      http-check expect status 200
      # Only send traffic to ready pods; inter/fall/rise reduce 503 during rotation when backends restart.
      default-server inter 3s fall 2 rise 3
      # init-addr none + resolvers k8s: resolve at runtime via CoreDNS so health checks see api-gateway
      server api api-gateway.off-campus-housing-tracker.svc.cluster.local:4020 check maxconn 4000 init-addr none resolvers k8s

    listen stats
      bind *:8404
      mode http
      stats enable
      stats uri /
      stats refresh 2s

