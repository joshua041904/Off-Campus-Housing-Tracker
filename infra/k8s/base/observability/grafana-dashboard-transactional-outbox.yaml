apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-transactional-outbox
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  transactional-outbox.json: |
    {
      "title": "OCH Transactional Outbox",
      "uid": "och-transactional-outbox",
      "schemaVersion": 39,
      "version": 1,
      "tags": ["och", "outbox", "kafka"],
      "timezone": "browser",
      "refresh": "30s",
      "panels": [
        {
          "id": 100,
          "type": "stat",
          "title": "Diagnostic — och_outbox_unpublished_count present",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [{ "refId": "A", "expr": "count(och_outbox_supported) or vector(0)" }]
        },
        {
          "id": 101,
          "type": "stat",
          "title": "Diagnostic — scrape up (auth-service)",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [{ "refId": "A", "expr": "max(up{job=~\"housing-.*\"}) or vector(0)" }]
        },
        {
          "id": 102,
          "type": "stat",
          "title": "Diagnostic — last sample age (outbox unpublished, s)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [{ "refId": "A", "expr": "time() - max(timestamp(och_outbox_unpublished_count or label_replace(auth_outbox_unpublished_count, \"service\", \"auth-service\", \"\", \"\")))" }]
        },
        {
          "id": 1,
          "type": "timeseries",
          "title": "Unpublished count by service",
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "och_outbox_unpublished_count or label_replace(auth_outbox_unpublished_count, \"service\", \"auth-service\", \"\", \"\")", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Oldest unpublished age (seconds) by service",
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "och_outbox_oldest_unpublished_age_seconds", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Publish attempts / s by service",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(och_outbox_publish_attempts_total[5m])) by (service)", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Publish failures / s by service",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(och_outbox_publish_failures_total[5m])) by (service)", "legendFormat": "{{service}}" }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Successful publishes / s by service",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(och_outbox_publish_success_total[5m])) by (service)", "legendFormat": "{{service}}" }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "name": "service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
            "query": "label_values(och_outbox_supported, service)",
            "includeAll": true,
            "multi": true
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" }
    }
