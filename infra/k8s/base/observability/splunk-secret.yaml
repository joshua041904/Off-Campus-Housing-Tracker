# Splunk HEC (HTTP Event Collector) for Otel. Replace with your Splunk HEC URL and token.
# Create token in Splunk: Settings -> Data inputs -> HTTP Event Collector -> New Token
apiVersion: v1
kind: Secret
metadata:
  name: splunk-secret
  namespace: observability
type: Opaque
stringData:
  # Full HEC URL, e.g. https://splunk.yourcompany.com:8088 or https://input-prd-p-xxxxx.splunkcloud.com:8088
  hec-url: "https://splunk.example.com:8088"
  # HEC token from Splunk (replace with real token for data to reach Splunk)
  hec-token: "PLACEHOLDER_REPLACE_WITH_REAL_HEC_TOKEN"
