apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  microservices-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{code=~\"5..\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))",
              "legendFormat": "p95 {{service}}",
              "refId": "A"
            }
          ],
          "title": "Response Time (p95)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))",
              "legendFormat": "p99 {{service}}",
              "refId": "A"
            }
          ],
          "title": "Response Time (p99)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["microservices", "overview", "och"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "label": "Datasource",
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Microservices Overview",
      "uid": "och-microservices-overview",
      "version": 1
    }
  distributed-tracing.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(jaeger_spans_total[5m])) by (service_name)",
              "legendFormat": "{{service_name}}",
              "refId": "A"
            }
          ],
          "title": "Trace Count",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "unit": "ops" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "sum(rate(jaeger_spans_total{error=\"true\"}[5m])) by (service_name)",
              "legendFormat": "{{service_name}}",
              "refId": "A"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["tracing", "jaeger", "och"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "label": "Datasource",
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Distributed Tracing",
      "uid": "och-distributed-tracing",
      "version": 1
    }
  housing-uptime.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "min": 0, "max": 1.05, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "id": 20,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "avg_over_time(up{job=\"housing-pods\",service=~\"$svc\"}[5m])",
              "legendFormat": "{{service}} ({{kubernetes_pod_name}})",
              "refId": "A"
            }
          ],
          "title": "Smoothed availability — avg_over_time(up[5m]) on matching services (reduces single-scrape blips)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "min": 0, "max": 1.05, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 9 },
          "id": 21,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "min_over_time(up{job=\"housing-pods\",service=~\"$svc\"}[1h])",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "title": "Strict 1h window — min_over_time(up[1h]); 0 means at least one failed scrape in the hour",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": { "defaults": { "min": 0, "max": 1.1, "unit": "short" }, "overrides": [] },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 18 },
          "id": 22,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "up{job=\"housing-pods\",service=~\"$svc\"}",
              "legendFormat": "{{service}} @ {{kubernetes_pod_name}}",
              "refId": "A"
            }
          ],
          "title": "Raw up{job=\"housing-pods\"} (per scrape)",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["uptime", "housing", "sli", "prometheus", "och"],
      "templating": {
        "list": [
          {
            "current": { "selected": false, "text": "Prometheus", "value": "Prometheus" },
            "hide": 0,
            "label": "Datasource",
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "type": "datasource"
          },
          {
            "name": "svc",
            "type": "textbox",
            "label": "Service filter (regex)",
            "query": "",
            "current": { "value": ".*", "text": ".*" },
            "options": [{ "value": ".*", "text": ".*" }]
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Housing uptime (Prometheus scrape SLI)",
      "uid": "och-housing-uptime",
      "version": 1
    }
