apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-analytics-intelligence
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  analytics-intelligence.json: |
    {
      "title": "OCH - AI Intelligence Runtime",
      "uid": "och-analytics-intelligence",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "refresh": "10s",
      "tags": ["och", "analytics", "llm", "slo"],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Analytics Latency p50/p95/p99 (ms)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "histogram_quantile(0.5, sum(rate(analytics_generation_latency_ms_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "refId": "B", "expr": "histogram_quantile(0.95, sum(rate(analytics_generation_latency_ms_bucket[5m])) by (le))", "legendFormat": "p95" },
            { "refId": "C", "expr": "histogram_quantile(0.99, sum(rate(analytics_generation_latency_ms_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Fallback Rate (/s)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(analytics_fallback_total[5m]))", "legendFormat": "fallback/s" }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Entropy (avg over 5m)",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(analytics_generation_entropy_sum[5m])) / clamp_min(sum(rate(analytics_generation_entropy_count[5m])), 1e-9)", "legendFormat": "entropy" }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Estimated Tokens (avg over 5m)",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(analytics_generation_tokens_estimated_sum[5m])) / clamp_min(sum(rate(analytics_generation_tokens_estimated_count[5m])), 1e-9)", "legendFormat": "tokens" }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Truncation Rate (/s)",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "sum(rate(analytics_generation_truncated_total[5m]))", "legendFormat": "truncations/s" }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Gateway p95 latency (s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "histogram_quantile(0.95, sum(rate(trace_service_latency_ms_bucket{service=\"api-gateway\"}[5m])) by (le))", "legendFormat": "gateway p95" }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "QA Suite Runtime (seconds)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            { "refId": "A", "expr": "analytics_qa_run_duration_seconds or on() vector(0)", "legendFormat": "qa runtime" }
          ]
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Fallback / generation requests (5m ratio)",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.02 }
                ]
              }
            }
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(analytics_fallback_total[5m])) / clamp_min(sum(rate(analytics_requests_total[5m])), 1e-9)"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Confidence score (v2, avg over 5m)",
          "gridPos": { "h": 8, "w": 16, "x": 8, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(analytics_generation_confidence_sum[5m])) / clamp_min(sum(rate(analytics_generation_confidence_count[5m])), 1e-9)",
              "legendFormat": "confidence"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus", "selected": false }
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" }
    }
