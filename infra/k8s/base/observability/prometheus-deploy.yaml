apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/och-slo.yml
      - /etc/prometheus/rules/kafka-health.yml
      - /etc/prometheus/rules/auth-outbox.yml
      - /etc/prometheus/rules/ollama-worker.yml
      - /etc/prometheus/rules/analytics-ai-slo.yml
      - /etc/prometheus/rules/ai-health-composite.yml
    scrape_configs:
      - job_name: 'prometheus'
        metrics_path: /prometheus/metrics
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'ollama'
        static_configs:
          - targets: ['ollama-gateway.off-campus-housing-tracker.svc.cluster.local:8081']
        metrics_path: /metrics
      # Static core-service scrapes (fast visibility even if Kubernetes SD/RBAC regresses).
      - job_name: 'housing-services-static'
        metrics_path: /metrics
        static_configs:
          - targets:
              - api-gateway.off-campus-housing-tracker.svc.cluster.local:4020
              - analytics-service.off-campus-housing-tracker.svc.cluster.local:4017
              - auth-service.off-campus-housing-tracker.svc.cluster.local:4011
              - listings-service.off-campus-housing-tracker.svc.cluster.local:4012
              - booking-service.off-campus-housing-tracker.svc.cluster.local:4013
              - messaging-service.off-campus-housing-tracker.svc.cluster.local:4014
              - notification-service.off-campus-housing-tracker.svc.cluster.local:4015
              - trust-service.off-campus-housing-tracker.svc.cluster.local:4016
              - media-service.off-campus-housing-tracker.svc.cluster.local:4018
      # All pods in the housing namespace that opt in via prometheus.io/* annotations
      # (correct HTTP/metrics port per deployment — avoids stale single-job ports).
      - job_name: 'housing-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - off-campus-housing-tracker
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
      - job_name: 'envoy-test-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - envoy-test
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
          # Caddy forwards /prometheus/* unchanged; Prometheus serves UI under this prefix.
          - '--web.external-url=https://off-campus-housing.test/prometheus/'
          - '--web.route-prefix=/prometheus/'
          # Store histogram exemplars (trace_id) from OpenMetrics scrapes (e.g. api-gateway).
          - '--enable-feature=exemplar-storage'
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: config
        projected:
          sources:
            - configMap:
                name: prometheus-config
                items:
                  - key: prometheus.yml
                    path: prometheus.yml
            - configMap:
                name: prometheus-rules-och-slo
                items:
                  - key: och-slo.yml
                    path: rules/och-slo.yml
            - configMap:
                name: prometheus-rules-kafka-health
                items:
                  - key: kafka-health.yml
                    path: rules/kafka-health.yml
            - configMap:
                name: prometheus-rules-auth-outbox
                items:
                  - key: auth-outbox.yml
                    path: rules/auth-outbox.yml
            - configMap:
                name: prometheus-rules-ollama-worker
                items:
                  - key: ollama-worker.yml
                    path: rules/ollama-worker.yml
            - configMap:
                name: prometheus-rules-analytics-ai-slo
                items:
                  - key: analytics-ai-slo.yml
                    path: rules/analytics-ai-slo.yml
            - configMap:
                name: prometheus-rules-ai-health-composite
                items:
                  - key: ai-health-composite.yml
                    path: rules/ai-health-composite.yml
            - configMap:
                name: prometheus-rules-coverage-integrity
                items:
                  - key: coverage-integrity.yml
                    path: rules/coverage-integrity.yml
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP
