apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: off-campus-housing-tracker
  labels: { app: auth-service }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4001"
        prometheus.io/path: "/metrics"
        linkerd.io/inject: disabled  # Disable sidecar: strict local gRPC health probes must reach app directly
    spec:
      # DATABASE_HOST from app-config (host.docker.internal / host.lima.internal); ensure resolvable in cluster (CoreDNS or overlay hostAliases).
      containers:
        - name: app
          image: auth-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4011
            - name: grpc
              containerPort: 50061
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef:    { name: app-secrets }
          env:
            - name: NODE_ENV
              value: "development"
            - name: GRPC_PORT
              value: "50061"
            - name: ENABLE_GRPC
              value: "true"
            - name: GRPC_REQUIRE_CLIENT_CERT
              value: "true"  # Strict mTLS: Envoy presents client cert to backends
            - name: TLS_CA_PATH
              value: "/etc/certs/ca.crt"  # Align server trust root with mounted service TLS chain
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "1"
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/certs/ca.crt"
            - name: TLS_KEY_PATH
              value: "/etc/certs/tls.key"
            - name: TLS_CERT_PATH
              value: "/etc/certs/tls.crt"
            - name: KAFKA_SSL_CA_CERT
              value: "/etc/kafka/secrets/ca-cert.pem"
            - name: KAFKA_CA_CERT
              value: "/etc/kafka/secrets/ca-cert.pem"
            - name: KAFKA_CLIENT_CERT
              value: "/etc/kafka/secrets/client.crt"
            - name: KAFKA_CLIENT_KEY
              value: "/etc/kafka/secrets/client.key"
            # Debug logging for gRPC 403 investigation
            - name: GRPC_VERBOSITY
              value: "DEBUG"
            - name: GRPC_TRACE
              value: "all"
            - name: NODE_DEBUG
              value: "http2"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"  # 2 cores per pod (4 replicas × 2 cores = 8 cores total, leaves 4 cores for other services)
              memory: "2Gi"
          volumeMounts:
            - name: proto-files
              mountPath: /app/proto
              readOnly: true
            - name: dev-root-ca
              mountPath: /certs
              readOnly: true
            - name: service-tls
              mountPath: /etc/certs
              readOnly: true
            - name: kafka-ssl-certs
              mountPath: /etc/kafka/secrets
              readOnly: true
          # Dual Health Checks: gRPC (for gRPC traffic) + HTTP (for HTTP/3 tests via Caddy)
          # gRPC Health Checks (grpc.health.v1.Health/Check) - HTTP/2/3 only, NOT HTTP/1.1
          # Uses grpc-health-probe binary for standard gRPC health checking protocol
          # Protocol: HTTP/2 cleartext (h2c) for in-cluster communication via Caddy
          # Service name: auth.AuthService (registered service name)
          # Note: Service runs in h2c mode (no TLS) for in-cluster, Caddy handles TLS at edge
          # Use plaintext mode since service runs h2c (no TLS) for in-cluster
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50061
                - -service=auth.AuthService
                - -tls
                - -tls-no-verify=false
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=off-campus-housing.local
                - -connect-timeout=10s
                - -rpc-timeout=5s
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 20
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50061
                - -service=auth.AuthService
                - -tls
                - -tls-no-verify=false
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=off-campus-housing.local
                - -connect-timeout=10s
                - -rpc-timeout=5s
            initialDelaySeconds: 150
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 6
          startupProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=localhost:50061
                - -service=auth.AuthService
                - -tls
                - -tls-no-verify=false
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=off-campus-housing.local
                - -connect-timeout=10s
                - -rpc-timeout=5s
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 20
            failureThreshold: 30
      volumes:
        - name: proto-files
          configMap:
            name: proto-files
        - name: dev-root-ca
          secret:
            secretName: dev-root-ca
            items:
              - key: dev-root.pem
                path: dev-root.pem
        - name: service-tls
          secret:
            secretName: och-service-tls
            items:
              - key: tls.key
                path: tls.key
              - key: tls.crt
                path: tls.crt
              - key: ca.crt
                path: ca.crt
        - name: kafka-ssl-certs
          secret:
            secretName: och-kafka-ssl-secret
            optional: true
            items:
              - key: ca-cert.pem
                path: ca-cert.pem
              - key: client.crt
                path: client.crt
              - key: client.key
                path: client.key