apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: off-campus-housing
  labels: { app: messaging-service }
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: { matchLabels: { app: messaging-service } }
  template:
    metadata:
      labels: { app: messaging-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "50064"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: messaging-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50064
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            - name: NODE_ENV
              value: "development"
            - name: GRPC_PORT
              value: "50064"
            - name: MESSAGING_DB_PORT
              value: "5444"
            - name: MESSAGING_DB_NAME
              value: "messaging"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket: { port: grpc }
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: grpc }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
