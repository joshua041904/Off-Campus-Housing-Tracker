apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: off-campus-housing-tracker
  labels: { app: kafka }
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      initContainers:
        - name: wait-for-zookeeper
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Zookeeper to be ready..."
              until nc -z zookeeper 2181; do
                echo "Zookeeper not ready yet, waiting..."
                sleep 2
              done
              echo "Zookeeper port is open, waiting a bit more for full readiness..."
              sleep 5
              echo "Zookeeper is ready!"
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: kafka
              containerPort: 9092
            - name: kafka-ssl
              containerPort: 9093
            - name: kafka-host
              containerPort: 29092
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-ssl-secret
              mountPath: /etc/kafka/secrets
              readOnly: true
          env:
            - { name: KAFKA_SSL_ENABLED, value: "true" }
            - { name: KAFKA_BROKER_ID, value: "1" }
            - { name: KAFKA_ZOOKEEPER_CONNECT, value: "zookeeper:2181" }
            - { name: KAFKA_CLUSTER_ID, value: "off-campus-housing-tracker-kafka-cluster" }
            # Strict TLS: SSL on 9093 (client-facing), PLAINTEXT on 9092 (inter-broker / optional)
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,SSL://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.off-campus-housing-tracker.svc.cluster.local:9092,SSL://kafka.off-campus-housing-tracker.svc.cluster.local:9093,PLAINTEXT_HOST://kafka.off-campus-housing-tracker.svc.cluster.local:29092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,SSL:SSL,PLAINTEXT_HOST:PLAINTEXT" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            # Keystore/truststore from kafka-ssl-secret (strict TLS)
            - { name: KAFKA_SSL_KEYSTORE_FILENAME, value: "kafka.keystore.jks" }
            - { name: KAFKA_SSL_KEYSTORE_LOCATION, value: "/etc/kafka/secrets/kafka.keystore.jks" }
            - { name: KAFKA_SSL_KEYSTORE_CREDENTIALS, value: "/etc/kafka/secrets/kafka.keystore-password" }
            - { name: KAFKA_SSL_KEY_CREDENTIALS, value: "/etc/kafka/secrets/kafka.key-password" }
            - { name: KAFKA_SSL_TRUSTSTORE_FILENAME, value: "kafka.truststore.jks" }
            - { name: KAFKA_SSL_TRUSTSTORE_LOCATION, value: "/etc/kafka/secrets/kafka.truststore.jks" }
            - { name: KAFKA_SSL_TRUSTSTORE_CREDENTIALS, value: "/etc/kafka/secrets/kafka.truststore-password" }
            # mTLS: clients must present a valid client cert (same CA as broker; supply client keystore to app env if needed).
            - { name: KAFKA_SSL_CLIENT_AUTH, value: "required" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            # Enable verbose logging to debug startup issues
            - { name: KAFKA_LOG4J_ROOT_LOGLEVEL, value: "INFO" }
            # Unset deprecated env vars that Kubernetes auto-injects from the service
            - { name: KAFKA_PORT, value: "" }
            - { name: KAFKA_ADVERTISED_PORT, value: "" }
            - { name: KAFKA_ADVERTISED_HOST, value: "" }
            - { name: KAFKA_HOST, value: "" }
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 180  # allow more time for SSL init
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18  # tolerate longer startup
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 300  # give Kafka ample time before liveness
            periodSeconds: 15  # Increased from 10s to 15s
            timeoutSeconds: 5
            failureThreshold: 6  # Increased from 5 to 6
      volumes:
        - name: kafka-data
          emptyDir: {}
        - name: kafka-ssl-secret
          secret:
            secretName: kafka-ssl-secret
            optional: false  # Required for strict TLS (run scripts/kafka-ssl-keystore-truststore.sh first)