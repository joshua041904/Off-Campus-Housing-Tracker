apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: 29092
      protocol: TCP
      name: kafka
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
subsets:
  - addresses:
      - ip: 10.0.0.8  # Host machine IP - update if different
    ports:
      - port: 29092
        name: kafka

