# Redis: external only (Docker Compose). In-cluster deploy/service removed.
# Uses redis-external Service+Endpoints; update Endpoints IP if Compose network changes.
# App-config REDIS_URL uses host.docker.internal for Kind/Colima.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: off-campus-housing-tracker

resources:
  - external-service.yaml