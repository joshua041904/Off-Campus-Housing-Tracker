apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: off-campus-housing-tracker
  labels:
    app: redis-external
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6380
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-external
  namespace: off-campus-housing-tracker
subsets:
  - addresses:
      # Host running Docker Compose Redis on port 6380 (housing; RP uses 6379)
      # Patch with host gateway IP (e.g. 192.168.5.1) via patch-redis-external-host.sh or hostAliases + REDIS_URL
      - ip: 10.0.0.8
    ports:
      - name: redis
        port: 6380

