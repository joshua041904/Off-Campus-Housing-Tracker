apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: off-campus-housing-tracker
  labels:
    app: redis-external
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Endpoints
metadata:
  name: redis-external
  namespace: off-campus-housing-tracker
subsets:
  - addresses:
      # Docker Compose Redis container IP
      # Update if container restarts: docker inspect off-campus-housing-tracker-redis-1 --format '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}'
      - ip: 172.18.0.2  # off-campus-housing-tracker-redis-1 container IP
    ports:
      - name: redis
        port: 6379

