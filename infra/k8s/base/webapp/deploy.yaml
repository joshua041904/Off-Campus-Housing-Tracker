apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: off-campus-housing-tracker
  labels:
    app: webapp
spec:
  replicas: 1
  # Single replica: avoid a second pod during rollouts (local `webapp:dev` is not pullable from a registry).
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: webapp:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NEXT_PUBLIC_API_BASE
              value: "https://off-campus-housing.test"
            # Optional: Maps Embed API key (browser-only; see docs/WEBAPP_GOOGLE_MAPS_AND_DEPLOY.txt).
            # Create: kubectl create secret generic webapp-runtime-secrets -n off-campus-housing-tracker \
            #   --from-literal=NEXT_PUBLIC_GOOGLE_MAPS_API_KEY='YOUR_KEY' --dry-run=client -o yaml | kubectl apply -f -
            - name: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: webapp-runtime-secrets
                  key: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
                  optional: true
          command:
            - pnpm
            - --filter
            - webapp
            - exec
            - next
            - start
            - -H
            - 0.0.0.0
            - -p
            - "3001"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
