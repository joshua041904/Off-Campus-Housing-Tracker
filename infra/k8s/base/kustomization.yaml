# Substrate + housing app services. Add more services under base/ and append to resources.
# Replace off-campus-housing-tracker namespace with your app namespace in all manifests.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  - config
  - kafka-external
  - envoy-test
  - redis
  - haproxy
  - nginx
  - observability
  - monitoring
  - exporters
  - api-gateway
  - auth-service
  - booking-service
  - messaging-service
  - media-service
