apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: off-campus-housing-tracker
  labels:
    app: notification-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4015"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
        - name: wait-kafka-tcp
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BROKER
                  optional: true
          command: ["sh", "-c"]
          args:
            - |
              set -e
              targets="${KAFKA_BROKER:-kafka-0.kafka-headless:9093,kafka-1.kafka-headless:9093,kafka-2.kafka-headless:9093}"
              targets="${targets},kafka-0.kafka:9093,kafka-1.kafka:9093,kafka-2.kafka:9093,kafka-0:9093,kafka-0:9092"
              echo "[wait-kafka-tcp] probing Kafka endpoints: $targets"
              i=0
              while [ "$i" -lt 360 ]; do
                IFS=','; for endpoint in $targets; do
                  host="${endpoint%%:*}"
                  port="${endpoint##*:}"
                  if [ "$port" = "$host" ]; then port=9093; fi
                  if nc -z "$host" "$port" 2>/dev/null; then
                    echo "[wait-kafka-tcp] ok via $host:$port"
                    exit 0
                  fi
                done
                unset IFS
                i=$((i+1))
                sleep 5
              done
              echo "[wait-kafka-tcp] timeout after probing: $targets"
              exit 1
      containers:
        - name: app
          image: notification-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4015
            - name: grpc
              containerPort: 50065
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: NODE_ENV
              value: "development"
            - name: OTEL_SERVICE_NAME
              value: "notification-service"
            - name: HTTP_PORT
              value: "4015"
            - name: GRPC_PORT
              value: "50065"
            - name: POSTGRES_URL_NOTIFICATION
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_URL_NOTIFICATION
            - name: GRPC_REQUIRE_CLIENT_CERT
              value: "true"
            - name: TLS_CA_PATH
              value: "/etc/certs/ca.crt"
            - name: TLS_CERT_PATH
              value: "/etc/certs/tls.crt"
            - name: TLS_KEY_PATH
              value: "/etc/certs/tls.key"
            - name: KAFKA_USE_SSL
              value: "true"
            - name: KAFKA_SSL_ENABLED
              value: "true"
            - name: KAFKA_CA_CERT
              value: "/etc/kafka/secrets/ca-cert.pem"
            - name: KAFKA_CLIENT_CERT
              value: "/etc/kafka/secrets/tls.crt"
            - name: KAFKA_CLIENT_KEY
              value: "/etc/kafka/secrets/tls.key"
          volumeMounts:
            - name: service-tls
              mountPath: /etc/certs
              readOnly: true
            - name: kafka-ssl
              mountPath: /etc/kafka/secrets
              readOnly: true
          # Startup / liveness: TCP only (gRPC+mTLS listener up). gRPC health includes DB — NOT_SERVING or Kafka
          # stalls during coordinator migration caused restart storms + SIGTERM → consumer disconnect + exit 0.
          startupProbe:
            tcpSocket:
              port: grpc
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/grpc-health-probe
                - -addr=127.0.0.1:50065
                - -service=notification.NotificationService
                - -tls
                - -tls-ca-cert=/etc/certs/ca.crt
                - -tls-client-cert=/etc/certs/tls.crt
                - -tls-client-key=/etc/certs/tls.key
                - -tls-server-name=localhost
                - -connect-timeout=10s
                - -rpc-timeout=10s
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 20
            successThreshold: 1
            failureThreshold: 8
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: service-tls
          secret:
            secretName: och-service-tls
            items:
              - key: tls.key
                path: tls.key
              - key: tls.crt
                path: tls.crt
              - key: ca.crt
                path: ca.crt
        - name: kafka-ssl
          secret:
            secretName: och-kafka-ssl-secret
            optional: true
            items:
              - key: ca-cert.pem
                path: ca-cert.pem
              - key: client.crt
                path: tls.crt
              - key: client.key
                path: tls.key
