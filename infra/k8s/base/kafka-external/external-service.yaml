# Service + Endpoints for external Kafka (Docker Compose strict TLS). Housing uses host port 29094 (RP uses 29093).
# Endpoints IP = host from cluster (host.docker.internal). Run:
#   ./scripts/patch-kafka-external-host.sh
# after apply.
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 29094
      protocol: TCP
      name: kafka-ssl
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
subsets:
  - addresses:
      - ip: 10.0.0.8
    ports:
      - port: 29094
        name: kafka-ssl
