# Service + Endpoints for external Kafka (Docker Compose strict TLS). Housing uses host port 29094 (RP uses 29093).
# Clients in-cluster use kafka-external:9093; kube-proxy forwards to Endpoints port 29094 on the listed IP.
#
# Default IP 192.168.64.1: Colima VM’s usual default gateway (host reachability from the Linux VM).
# If `kubectl exec … -- nc -vz kafka-external 9093` fails, override this Endpoints IP or run:
#   ./scripts/patch-kafka-external-host.sh
# (script resolves host.docker.internal / Docker host-gateway — no silent wrong fallback).
apiVersion: v1
kind: Service
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 29094
      protocol: TCP
      name: kafka-ssl
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-external
  namespace: off-campus-housing-tracker
subsets:
  - addresses:
      - ip: 192.168.64.1
    ports:
      - port: 29094
        name: kafka-ssl
