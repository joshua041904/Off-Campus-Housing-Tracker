apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: off-campus-housing-tracker
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: ollama-health-proxy
    files:
      - server.js=ollama-health-proxy/server.js
resources:
  - service.yaml
  - deploy.yaml
  - hpa.yaml
