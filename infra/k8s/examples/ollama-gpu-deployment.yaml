# Reference only — not applied by kustomize. Use on GPU-capable nodes (nvidia device plugin).
# One replica per GPU; scale horizontally by adding nodes / replicas; tune OLLAMA_KEEP_ALIVE for warm models.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  namespace: off-campus-housing-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-gpu
  template:
    metadata:
      labels:
        app: ollama-gpu
    spec:
      nodeSelector:
        nvidia.com/gpu.present: "true"
      containers:
        - name: ollama
          image: ollama/ollama:0.22.0
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: "20m"
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "2000m"
              memory: "16Gi"
