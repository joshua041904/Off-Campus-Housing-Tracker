# External infra only. k3s runs all application services (auth, listings, api-gateway, webapp, etc.).
# Postgres 8: 5441–5448 | Redis: 6380 | MinIO: 9000/9001
# Kafka: use in-cluster KRaft brokers (kafka-0,1,2); see infra/k8s/kafka-kraft-metallb/ and scripts/create-kafka-event-topics-k8s.sh.
# Each Postgres instance: max_connections=400 so many services × ~40 pool slots do not exhaust the server under HTTP/2 multiplexing.
# Flow: docker compose up -d → bootstrap-all-dbs.sh → verify-bootstrap.sh → start k3s → deploy-dev.sh
#
# Jaeger (optional local traces): UI http://localhost:16686 — set OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318
# on workloads that run on the host, or http://host.docker.internal:4318 from containers that are not on this compose network.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.54
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped

  # SMTP sink for dev/staging: messaging-service uses SMTP_HOST=host.docker.internal:1025 (see app-secrets).
  # Web UI: http://localhost:8025 — verify external-contact emails land here after Send email.
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lfu
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres-auth:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth
    ports:
      - "5441:5432"
    volumes:
      - pg-auth:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-listings:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: listings
    ports:
      - "5442:5432"
    volumes:
      - pg-listings:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-bookings:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookings
    ports:
      - "5443:5432"
    volumes:
      - pg-bookings:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-messaging:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messaging
    ports:
      - "5444:5432"
    volumes:
      - pg-messaging:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-notification:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification
    ports:
      - "5445:5432"
    volumes:
      - pg-notification:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-trust:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trust
    ports:
      - "5446:5432"
    volumes:
      - pg-trust:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-analytics:
    # pgvector for hybrid search (infra/db/07-analytics-pgvector-hybrid-search.sql).
    image: pgvector/pgvector:pg16
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5447:5432"
    volumes:
      - pg-analytics:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-media:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=400"]
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media
    ports:
      - "5448:5432"
    volumes:
      - pg-media:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

volumes:
  minio_data:
  pg-auth:
  pg-listings:
  pg-bookings:
  pg-messaging:
  pg-notification:
  pg-trust:
  pg-analytics:
  pg-media:
