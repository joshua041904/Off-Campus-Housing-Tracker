syntax = "proto3";

package events.booking;

option go_package = "github.com/yourorg/off-campus-housing-tracker/proto/events/booking";

// Versioned event payloads for dev.booking.events. Envelope wraps these; no DB leakage.

message BookingCreatedV1 {
  string booking_id = 1;
  string listing_id = 2;
  string tenant_id = 3;
  string start_date = 4;
  string end_date = 5;
}

message BookingConfirmedV1 {
  string booking_id = 1;
  string listing_id = 2;
  string tenant_id = 3;
  string landlord_id = 4;
}

message BookingCancelledV1 {
  string booking_id = 1;
  string listing_id = 2;
  string cancelled_by = 3; // tenant or landlord
}

message BookingCompletedV1 {
  string booking_id = 1;
  string listing_id = 2;
  string tenant_id = 3;
  string landlord_id = 4;
}
