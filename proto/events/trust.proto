syntax = "proto3";

package events.trust;

option go_package = "github.com/yourorg/off-campus-housing-tracker/proto/events/trust";

// Versioned event payloads for dev.trust.events. Trust owns trust; listing listens optionally.

message ListingFlaggedV1 {
  string listing_id = 1;
  string flagged_by = 2;
  string reason = 3;
}

message ListingUnflaggedV1 {
  string listing_id = 1;
}

message ReviewCreatedV1 {
  string review_id = 1;
  string booking_id = 2;
  string reviewer_id = 3;
  string reviewee_id = 4;
  int32 rating = 5;
}

message UserReputationUpdatedV1 {
  string user_id = 1;
  double new_score = 2;
}
