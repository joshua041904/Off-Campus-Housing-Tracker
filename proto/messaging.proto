syntax = "proto3";

package messaging;

option go_package = "github.com/yourorg/off-campus-housing-tracker/proto/messaging";

// Messaging service — send message, get conversation (cursor pagination), mark as read. Read state is per-user (conversation_participants.last_read_at).
service MessagingService {
  rpc SendMessage(SendMessageRequest) returns (MessageResponse);
  rpc GetConversation(GetConversationRequest) returns (ConversationResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
}

message SendMessageRequest {
  string conversation_id = 1;
  string sender_id = 2;
  string content = 3;
  string media_id = 4;   // optional; reference from Media service upload
}

message MessageResponse {
  string message_id = 1;
  string sent_at = 2;
}

message GetConversationRequest {
  string conversation_id = 1;
  int32 limit = 2;        // pagination
  string before = 3;      // message_id cursor (exclusive)
}

message ConversationResponse {
  repeated Message messages = 1;
  bool has_more = 2;
}

message Message {
  string message_id = 1;
  string sender_id = 2;
  string content = 3;
  string sent_at = 4;
  string media_id = 5;   // optional; reference to Media service object
}

message MarkAsReadRequest {
  string conversation_id = 1;
  string user_id = 2;
  string message_id = 3;  // optional: read up to this message (sets last_read_at to message's created_at)
}

message MarkAsReadResponse {
  bool success = 1;
}
