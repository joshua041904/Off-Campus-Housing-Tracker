syntax = "proto3";

package media;

option go_package = "github.com/yourorg/off-campus-housing-tracker/proto/media";

// Media service — upload, signed URLs. No video bytes in gRPC; store in object storage (MinIO/S3).
service MediaService {
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse);
  rpc GeneratePresignedUploadURL(GeneratePresignedUploadURLRequest) returns (GeneratePresignedUploadURLResponse);
  rpc GeneratePresignedDownloadURL(GeneratePresignedDownloadURLRequest) returns (GeneratePresignedDownloadURLResponse);
}

message UploadFileRequest {
  string conversation_id = 1;  // or context for naming
  string user_id = 2;
  string content_type = 3;
  bytes chunk = 4;             // stream or chunked; validate size/type server-side
}

message UploadFileResponse {
  string media_id = 1;
  string created_at = 2;
}

message GeneratePresignedUploadURLRequest {
  string content_type = 1;
  string suggested_name = 2;
}

message GeneratePresignedUploadURLResponse {
  string upload_url = 1;
  string media_id = 2;
  int32 expires_in_seconds = 3;
}

message GeneratePresignedDownloadURLRequest {
  string media_id = 1;
}

message GeneratePresignedDownloadURLResponse {
  string download_url = 1;
  int32 expires_in_seconds = 2;
}
