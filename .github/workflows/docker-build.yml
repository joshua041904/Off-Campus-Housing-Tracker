# OCH Docker images — real services only (no records/social/shopping/auction-monitor).
# python-ai-service: add to matrix when services/python-ai-service/Dockerfile exists in repo.
name: och-docker-build

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - transport-watchdog
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs
          - webapp

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'webapp' && 'webapp/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: false
          tags: och-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
