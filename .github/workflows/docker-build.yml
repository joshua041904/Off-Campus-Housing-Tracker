# OCH Docker images — real services only (no records/social/shopping/auction-monitor).
# python-ai-service: add to matrix when services/python-ai-service/Dockerfile exists in repo.
name: och-docker-build

on:
  push:
    branches:
      - main
      - master
      - develop
      - fix/**
      - feat/**
      - feature/**
      - chore/**
      - hotfix/**
  pull_request:
  workflow_dispatch:

# Avoid starving other workflows: only N image builds at once (GitHub-hosted runner pool is shared).
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        service:
          - api-gateway
          - transport-watchdog
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs
          - webapp

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'webapp' && 'webapp/Dockerfile' || format('services/{0}/Dockerfile', matrix.service) }}
          push: false
          tags: och-${{ matrix.service }}:ci
          # Read GHA cache only; omit cache-to — exporting to results-receiver.actions.githubusercontent.com
          # often hits DeadlineExceeded i/o timeouts and fails the whole job after a successful build.
          cache-from: type=gha
