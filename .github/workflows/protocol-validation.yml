# Static + fixture gates (no cluster). Playwright job always runs: strict verticals when
# RUN_STRICT_PLAYWRIGHT=true, otherwise install + `playwright test --list` smoke on ubuntu-latest.
name: Protocol validation (static + fixtures)

on:
  push:
    branches:
      - main
      - master
      - develop
      - fix/**
      - feat/**
      - feature/**
      - chore/**
      - hotfix/**
    paths:
      - "scripts/protocol/**"
      - "scripts/transport/**"
      - "scripts/ci/**"
      - "scripts/bring-up-external-infra.sh"
      - "scripts/validate-kafka-stack-contract.sh"
      - "scripts/recycle-och-postgres-compose.sh"
      - "scripts/lib/**"
      - "scripts/verify-preflight-edge-routing.sh"
      - "scripts/run-housing-k6-edge-smoke.sh"
      - "infra/k8s/overlays/dev/ingress.yaml"
      - "scripts/run-preflight-scale-and-all-suites.sh"
      - "scripts/verify-kafka-tls-sans.sh"
      - "scripts/verify-kafka-kraft-advertised-listeners.sh"
      - "scripts/verify-kafka-cluster.sh"
      - "scripts/kafka-ssl-from-dev-root.sh"
      - "scripts/perf/extract-protocol-matrix.js"
      - "scripts/load/k6-gateway-collapse-smoke.js"
      - "webapp/e2e/**"
      - "webapp/playwright.config.ts"
      - "webapp/playwright.global-setup.ts"
      - "webapp/package.json"
      - ".github/workflows/protocol-validation.yml"
      - ".github/workflows/**"
  # All PRs run this workflow (predictable check count). Push uses path filters above (plus any workflow change).
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  shellcheck-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck preflight script
        # -S error: only ShellCheck "error" severity fails (avoids info/style exit 1 on huge orchestrator).
        run: shellcheck -S error -x -e SC2015,SC2317,SC1091,SC2030,SC2031,SC2097,SC2098,SC2034,SC2154,SC2318,SC2129,SC2012,SC2002 scripts/run-preflight-scale-and-all-suites.sh
      - name: ShellCheck certification script
        run: shellcheck -S error scripts/ci/run-full-certification.sh
      - name: ShellCheck CI invariant scripts
        run: shellcheck -S error -x -e SC2015,SC2016,SC2012,SC1091,SC2002 scripts/ci/verify-docker-ports.sh scripts/ci/verify-quic-hostname-invariant.sh scripts/ci/verify-housing-grpc-matrix.sh scripts/ci/generate-kafka-ci-tls.sh scripts/ci/start-kafka-tls-ci.sh scripts/ci/delete-kafka-event-topics.sh scripts/create-kafka-event-topics.sh scripts/create-kafka-event-topics-k8s.sh scripts/lib/och-kafka-event-topics-from-proto.sh scripts/lib/kafka-kraft-quorum-ok.sh scripts/verify-proto-topic-alignment.sh scripts/verify-proto-events-topics.sh scripts/verify-kafka-broker-keystore-jks.sh scripts/verify-kafka-event-topic-partitions.sh scripts/verify-kafka-tls-sans.sh scripts/verify-kafka-kraft-advertised-listeners.sh scripts/verify-kafka-cluster.sh scripts/kafka-rolling-restart.sh scripts/kafka-tls-guard.sh scripts/kafka-tls-rotate-atomic.sh scripts/export-kafka-ca-metric.sh scripts/verify-preflight-edge-routing.sh scripts/run-housing-k6-edge-smoke.sh scripts/wait-for-docker-compose-kafka-strict-ready.sh scripts/ensure-kafka-ready.sh scripts/validate-kafka-stack-contract.sh scripts/run-kafka-contract-validate.sh scripts/verify-kafka-kraft-e2e.sh scripts/colima-forward-6443.sh scripts/colima-api-health.sh scripts/bring-up-external-infra.sh scripts/recycle-och-postgres-compose.sh scripts/rollout-deferred-after-kafka-tls.sh scripts/apply-kafka-kraft-staged.sh scripts/kafka-quorum-stable.sh scripts/service-tls-alias-guard.sh scripts/edge-readiness-gate.sh

      - name: Kafka broker EKU + infra auto-create invariants
        run: |
          set -euo pipefail
          for f in scripts/kafka-ssl-from-dev-root.sh scripts/dev-generate-certs.sh scripts/ci/generate-kafka-ci-tls.sh; do
            test -f "$f"
            while IFS= read -r line; do
              case "$line" in
                *extendedKeyUsage*serverAuth*)
                  echo "$line" | grep -q clientAuth || { echo "Kafka broker signing must include clientAuth with serverAuth: $f"; echo "$line"; exit 1; }
                  ;;
              esac
            done < <(grep -h 'extendedKeyUsage' "$f" 2>/dev/null || true)
          done
          if grep -R --include='*.yaml' --include='*.yml' -E 'auto\.create\.topics\.enable:\s*true' infra/ 2>/dev/null | grep -q .; then
            echo "Forbidden: auto.create.topics.enable=true under infra/"
            exit 1
          fi

  transport-quic-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: QUIC libs on disk + py_compile + transport_validator CLI smoke
        run: |
          set -euo pipefail
          test -f scripts/lib/transport_validator.py
          test -f scripts/lib/analyze_quic_metrics.py
          test -f scripts/lib/dominance_map.py
          python3 -m py_compile scripts/lib/transport_validator.py scripts/lib/analyze_quic_metrics.py scripts/lib/dominance_map.py
          code=0
          out="$(python3 scripts/lib/transport_validator.py 2>&1)" || code=$?
          printf '%s\n' "$out"
          test "$code" -eq 2
          printf '%s\n' "$out" | grep -q 'no pcap provided'

  endpoint-coverage-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Endpoint coverage (advisory — does not fail PR)
        run: node scripts/protocol/endpoint-coverage-analyze.js --repo-root "$GITHUB_WORKSPACE"

  readiness-with-transport-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: declare-readiness + transport artifact fixture
        run: |
          node scripts/protocol/declare-readiness.js \
            --perf-dir scripts/protocol/fixtures/perf-lab-pass \
            --transport-artifact scripts/protocol/fixtures/final-transport-artifact-pass.json

  playwright-strict-verticals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Strict verticals (RUN_STRICT_PLAYWRIGHT) or Playwright smoke
        env:
          RUN_STRICT_PLAYWRIGHT: ${{ vars.RUN_STRICT_PLAYWRIGHT }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/webapp"
          pnpm exec playwright install chromium --with-deps
          if [ "${RUN_STRICT_PLAYWRIGHT:-}" = "true" ]; then
            bash "$GITHUB_WORKSPACE/scripts/dev-generate-certs.sh"
            export NODE_EXTRA_CA_CERTS="$GITHUB_WORKSPACE/certs/dev-root.pem"
            PLAYWRIGHT_VERTICAL_STRICT=1 PLAYWRIGHT_STRICT_HTTP3=1 pnpm run test:e2e:strict-verticals-and-integrity
          else
            echo "RUN_STRICT_PLAYWRIGHT not true — Playwright smoke (test --list)"
            pnpm exec playwright test --list
          fi
