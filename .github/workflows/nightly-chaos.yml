# Nightly / on-demand chaos artifact generation (optional).
# Default: workflow_dispatch only. Uncomment `schedule` when a runner has cluster access.
name: Chaos suite (optional)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 8 * * *"

jobs:
  chaos-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Chaos suite (no cluster — dry artifacts)
        run: |
          chmod +x scripts/run-chaos-suite.sh scripts/generate-chaos-report.py || true
          CHAOS_SUITE_ARTIFACT_DIR="${{ github.workspace }}/bench_logs/chaos-ci-${{ github.run_id }}" \
            CHAOS_SUITE=baseline bash scripts/run-chaos-suite.sh || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chaos-suite-${{ github.run_id }}
          path: bench_logs/chaos-ci-*/
