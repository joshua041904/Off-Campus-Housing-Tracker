# Syntax-check Kafka DNS validation script (no cluster on ubuntu-latest).
name: kafka-dns-validate

on:
  push:
    paths:
      - "scripts/validate-kafka-dns.sh"
      - "scripts/preflight-kafka-k8s-rollout.sh"
      - "scripts/create-kafka-event-topics-k8s.sh"
      - "infra/k8s/kafka-kraft-metallb/**"
      - "infra/ops/**"
      - "infra/policies/kafka-replica-guard.yaml"
      - "monitoring/prometheus-rules/kafka-kraft-dns.yaml"
  pull_request:
    paths:
      - "scripts/validate-kafka-dns.sh"
      - "scripts/preflight-kafka-k8s-rollout.sh"
      - "scripts/create-kafka-event-topics-k8s.sh"
      - "infra/k8s/kafka-kraft-metallb/**"
      - "infra/ops/**"
      - "infra/policies/kafka-replica-guard.yaml"
      - "monitoring/prometheus-rules/kafka-kraft-dns.yaml"
  workflow_dispatch:

jobs:
  shell-and-kustomize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.2"
      - name: Bash syntax (Kafka helper scripts)
        run: |
          bash -n scripts/validate-kafka-dns.sh
          bash -n scripts/preflight-kafka-k8s-rollout.sh
          bash -n scripts/create-kafka-event-topics-k8s.sh
      - name: Kustomize build kafka-kraft-metallb
        run: kubectl kustomize infra/k8s/kafka-kraft-metallb/ >/tmp/kafka-kraft.yaml && test -s /tmp/kafka-kraft.yaml
      - name: Kustomize build infra ops
        run: kubectl kustomize infra/ops/ >/tmp/kafka-ops.yaml && test -s /tmp/kafka-ops.yaml
