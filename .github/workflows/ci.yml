# OCH — no cluster on ubuntu-latest. Order: protocol-anomaly → build → test → transport-validation → QUIC invariant; Playwright optional (self-hosted).
name: och-ci

on:
  push:
  pull_request:

concurrency:
  group: och-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  protocol-anomaly:
    name: Protocol matrix anomaly check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Regenerate anomalies + require no HTTP/2 collapse
        run: |
          set -euo pipefail
          EXTRACT_PROTOCOL_MATRIX_FROM_CSV=1 node scripts/perf/extract-protocol-matrix.js
          test -f bench_logs/performance-lab/protocol-matrix-anomalies.json
          cat bench_logs/performance-lab/protocol-matrix-anomalies.json
          grep '"any_http2_collapse_anomaly": false' bench_logs/performance-lab/protocol-matrix-anomalies.json

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: protocol-anomaly
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C services/${{ matrix.service }} build

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C services/${{ matrix.service }} test --if-present

  transport-validation:
    name: Transport validation (Python tooling)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: QUIC libs on disk + py_compile + transport_validator CLI smoke
        run: |
          set -euo pipefail
          test -f scripts/lib/transport_validator.py
          test -f scripts/lib/analyze_quic_metrics.py
          test -f scripts/lib/dominance_map.py
          python3 -m py_compile scripts/lib/transport_validator.py scripts/lib/analyze_quic_metrics.py scripts/lib/dominance_map.py
          code=0
          out="$(python3 scripts/lib/transport_validator.py 2>&1)" || code=$?
          printf '%s\n' "$out"
          test "$code" -eq 2
          printf '%s\n' "$out" | grep -q 'no pcap provided'

  quic-hostname-invariant:
    name: Enforce QUIC hostname invariant
    runs-on: ubuntu-latest
    needs: transport-validation
    steps:
      - uses: actions/checkout@v4
      - name: No raw-IP https BASE_URL defaults in k6 load scripts
        run: bash scripts/ci/verify-quic-hostname-invariant.sh

  playwright-strict:
    name: Strict Playwright
    if: vars.RUN_STRICT_PLAYWRIGHT == 'true'
    runs-on: ubuntu-latest
    needs: transport-validation
    env:
      PLAYWRIGHT_STRICT_HTTP3: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd webapp && pnpm exec playwright install chromium --with-deps
      - run: cd webapp && pnpm run test:e2e:strict-verticals-and-integrity
