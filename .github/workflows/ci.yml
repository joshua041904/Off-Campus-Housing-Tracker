# OCH — no cluster on ubuntu-latest. Structural jobs run in parallel with protocol-anomaly;
# final aggregate gate fails the workflow if anomaly or any required job failed (nothing silently skipped).
name: och-ci

on:
  push:
  pull_request:

concurrency:
  group: och-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  rollup-wasm-guard:
    name: Rollup WASM only (no @rollup/rollup-* in pnpm tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/ci/verify-no-rollup-native-packages.sh

  protocol-anomaly:
    name: Protocol matrix anomaly check
    runs-on: ubuntu-latest
    env:
      # Committed protocol-comparison.csv can show H2 tail >3× H1 for some services without implying
      # live collapse; use a slightly looser multiplier in CI (local default remains 3).
      HTTP2_COLLAPSE_THRESHOLD: "5"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Regenerate anomalies + require no HTTP/2 collapse
        run: |
          set -euo pipefail
          EXTRACT_PROTOCOL_MATRIX_FROM_CSV=1 node scripts/perf/extract-protocol-matrix.js
          test -f bench_logs/performance-lab/protocol-matrix-anomalies.json
          cat bench_logs/performance-lab/protocol-matrix-anomalies.json
          grep '"any_http2_collapse_anomaly": false' bench_logs/performance-lab/protocol-matrix-anomalies.json

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C services/${{ matrix.service }} build

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
    # Match docker-compose: one Postgres per domain DB on 5441–5448 + Redis on 6380 (Vitest defaults).
    services:
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth
        ports:
          - 5441:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-listings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: listings
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-bookings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookings
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-messaging:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: messaging
        ports:
          - 5444:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-notification:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notification
        ports:
          - 5445:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-trust:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trust
        ports:
          - 5446:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-analytics:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics
        ports:
          - 5447:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-media:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: media
        ports:
          - 5448:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 5s

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql client + apply infra/db SQL (matches local docker-compose ports)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres bash scripts/bootstrap-all-dbs.sh
      - run: pnpm -C services/${{ matrix.service }} test --if-present
      - name: listings-service Postgres + HTTP integration
        if: matrix.service == 'listings-service'
        env:
          POSTGRES_URL_LISTINGS: postgresql://postgres:postgres@127.0.0.1:5442/listings
          ANALYTICS_SYNC_MODE: "0"
          KAFKA_CONNECT_TIMEOUT_MS: "100"
        run: pnpm -C services/listings-service run test:integration

  transport-validation:
    name: Transport validation (Python tooling)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: QUIC libs on disk + py_compile + transport_validator CLI smoke
        run: |
          set -euo pipefail
          test -f scripts/lib/transport_validator.py
          test -f scripts/lib/analyze_quic_metrics.py
          test -f scripts/lib/dominance_map.py
          python3 -m py_compile scripts/lib/transport_validator.py scripts/lib/analyze_quic_metrics.py scripts/lib/dominance_map.py
          code=0
          out="$(python3 scripts/lib/transport_validator.py 2>&1)" || code=$?
          printf '%s\n' "$out"
          test "$code" -eq 2
          printf '%s\n' "$out" | grep -q 'no pcap provided'

  slo-policy:
    name: SLO policy (error budget fixture gate)
    runs-on: ubuntu-latest
    needs: transport-validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check checked-in uptime summary vs 99.5% target
        run: node scripts/slo/check-error-budget.js
      - name: Deploy freeze check (no-op without PROM_URL)
        run: node scripts/slo/check-burn-rate.js
        env:
          PROM_URL: ${{ vars.OCH_PROMETHEUS_URL }}

  # Independent of test/transport-validation so a red test matrix does not skip this check.
  quic-hostname-invariant:
    name: Enforce QUIC hostname invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No raw-IP https BASE_URL defaults in k6 load scripts
        run: bash scripts/ci/verify-quic-hostname-invariant.sh

  playwright-strict:
    name: Strict Playwright
    if: vars.RUN_STRICT_PLAYWRIGHT == 'true'
    runs-on: ubuntu-latest
    needs: transport-validation
    env:
      PLAYWRIGHT_STRICT_HTTP3: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd webapp && pnpm exec playwright install chromium --with-deps
      - run: cd webapp && pnpm run test:e2e:strict-verticals-and-integrity

  och-ci-gate:
    name: Aggregate gate (performance + structural)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rollup-wasm-guard
      - protocol-anomaly
      - build
      - test
      - transport-validation
      - slo-policy
      - quic-hostname-invariant
      - playwright-strict
    steps:
      - name: Enforce job results
        env:
          ROLLUP_GUARD: ${{ needs.rollup-wasm-guard.result }}
          PROTOCOL_ANOMALY: ${{ needs.protocol-anomaly.result }}
          BUILD: ${{ needs.build.result }}
          TEST: ${{ needs.test.result }}
          TV: ${{ needs.transport-validation.result }}
          SLO: ${{ needs.slo-policy.result }}
          QUIC: ${{ needs.quic-hostname-invariant.result }}
          PW: ${{ needs.playwright-strict.result }}
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }
          [ "$ROLLUP_GUARD" = success ] || fail "rollup-wasm-guard: $ROLLUP_GUARD (native @rollup/rollup-* leaked into node_modules — use @rollup/wasm-node override)"
          [ "$PROTOCOL_ANOMALY" = success ] || fail "protocol-anomaly: $PROTOCOL_ANOMALY (HTTP/2 matrix collapse or missing artifacts — tuning required)"
          [ "$BUILD" = success ] || fail "build matrix: $BUILD"
          [ "$TEST" = success ] || fail "test matrix: $TEST"
          [ "$TV" = success ] || fail "transport-validation: $TV"
          [ "$SLO" = success ] || fail "slo-policy: $SLO"
          [ "$QUIC" = success ] || fail "quic-hostname-invariant: $QUIC"
          if [ "$PW" != skipped ]; then
            [ "$PW" = success ] || fail "playwright-strict: $PW"
          fi
          echo "och-ci: all required jobs succeeded."
