# Production-grade CI: Postgres 16, Redis, Kafka (KRaft), MinIO; bootstrap all 8 DBs (auth..media) from infra/db on single instance (port 5441); optional restore from backups/5437-auth.dump; Kafka topics; unit + integration + event-layer; optional k6 smoke.
# All *_DB_PORT and VERIFY_DB_PORT=5441 so one Postgres container hosts all eight databases.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  full-stack-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5441:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6380:6379

      kafka:
        image: bitnami/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_NODE_ID: 1
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
          ALLOW_PLAINTEXT_LISTENER: "yes"

      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live || exit 1"
        command: server /data

    env:
      PGPASSWORD: postgres
      VERIFY_DB_HOST: 127.0.0.1
      VERIFY_DB_PORT: "5441"
      AUTH_DB_PORT: "5441"
      LISTINGS_DB_PORT: "5441"
      BOOKINGS_DB_PORT: "5441"
      MESSAGING_DB_PORT: "5441"
      NOTIFICATION_DB_PORT: "5441"
      TRUST_DB_PORT: "5441"
      ANALYTICS_DB_PORT: "5441"
      MEDIA_DB_PORT: "5441"
      BOOTSTRAP_HOST: 127.0.0.1
      REDIS_URL: "redis://127.0.0.1:6380/0"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -p 5441 -U postgres; do
            sleep 2
          done

      - name: Bootstrap all 8 databases (infra/db)
        run: |
          DROP_IF_EXISTS=true ./scripts/bootstrap-all-dbs.sh

      - name: Verify bootstrap
        run: ./scripts/verify-bootstrap.sh

      - name: Restore auth dump if present
        run: |
          if [[ -f backups/5437-auth.dump || -f backups/5437-auth.dump.gz || -f backups/5437-auth.dump.zip ]]; then
            PGHOST=127.0.0.1 PGPORT=5441 PGPASSWORD=postgres ./scripts/restore-auth-db.sh
            PGHOST=127.0.0.1 PGPORT=5441 PGPASSWORD=postgres ./scripts/verify-auth-integrity.sh
          else
            echo "No auth dump in backups/, skipping restore"
          fi

      - name: Wait for Kafka and create event topics
        run: |
          for i in $(seq 1 30); do nc -z 127.0.0.1 9092 && break; sleep 2; done
          for t in dev.booking.events dev.listing.events dev.trust.events dev.auth.events dev.messaging.events dev.notification.events dev.media.events dev.messaging.dlq; do
            docker run --rm --network host bitnami/kafka:latest kafka-topics.sh \
              --bootstrap-server 127.0.0.1:9092 \
              --create --topic "$t" --partitions 6 --replication-factor 1 2>/dev/null || true
          done
          echo "Kafka topics created or already exist"

      - name: Run unit tests
        run: pnpm run test

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Event-layer verification
        run: pnpm --filter event-layer-verification test

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: k6 smoke (best-effort; no app in CI)
        run: |
          BASE_URL=http://localhost:4000 DURATION=10s MESSAGES_TOTAL=10 \
            k6 run scripts/load/k6-messaging-flow.js || true

  perf-smoke:
    runs-on: ubuntu-latest
    needs: full-stack-tests
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder for k6 limit-finder (enable when app runs in CI)
        run: echo "Run k6-messaging-limit-finder.js when gateway + services are started in CI; fail if P99 > 500ms or error rate > 5%"
