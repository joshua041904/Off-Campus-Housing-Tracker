# Build, unit tests, integration tests, event-layer break tests.
# pnpm version from package.json packageManager (Corepack). No duplicate version.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Enable Corepack and install pnpm from package.json
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (common)
        run: pnpm --filter "@common/utils" run test

      - name: Run unit tests (media-service)
        run: pnpm --filter media-service run test

      - name: Run unit tests (messaging-service)
        run: pnpm --filter messaging-service run test

      - name: Run integration tests (messaging-service)
        run: pnpm --filter messaging-service run test:integration

  event-layer-break-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Enable Corepack and install pnpm from package.json
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run event-layer-verification tests
        run: pnpm --filter event-layer-verification run test
