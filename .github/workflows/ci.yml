# OCH — no cluster on ubuntu-latest. Structural jobs run in parallel with protocol-anomaly;
# final aggregate gate fails the workflow if anomaly or any required job failed (nothing silently skipped).
name: och-ci

# pull_request: all PRs. push: default + feature branches — same commit on an open PR triggers BOTH, so you
# see ~2× och-ci rows (pull_request) vs (push) in the checks UI. That is intentional for teams that want
# push and PR signals separately. Concurrency includes github.event_name so those two runs do not cancel
# each other; repeated pushes of the same event type still cancel in-progress for that type.
on:
  push:
    branches:
      - main
      - master
      - develop
      - fix/**
      - feat/**
      - feature/**
      - chore/**
      - hotfix/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  rollup-wasm-guard:
    name: Rollup WASM only (no @rollup/rollup-* in pnpm tree)
    runs-on: ubuntu-latest
    env:
      ROLLUP_DISABLE_NATIVE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Clean install state
        run: |
          rm -rf node_modules
          pnpm store prune || true
      - name: Repair merged lockfile
        run: pnpm install --no-frozen-lockfile
      - name: Verify Rollup wasm-only resolution
        run: pnpm run ci:guard:rollup

  protocol-anomaly:
    name: Protocol matrix anomaly check
    runs-on: ubuntu-latest
    env:
      # Committed protocol-comparison.csv can show H2 tail >3× H1 for some services without implying
      # live collapse; use a slightly looser multiplier in CI (local default remains 3).
      HTTP2_COLLAPSE_THRESHOLD: "5"
    steps:
      - uses: actions/checkout@v4
      - name: Verify housing *-service gRPC matrix (proto + grpc-server + server bootstrap)
        run: bash scripts/ci/verify-housing-grpc-matrix.sh
      - name: Proto events ↔ Kafka topic naming contract
        run: bash scripts/verify-proto-events-topics.sh
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Regenerate anomalies + require no HTTP/2 collapse
        run: |
          set -euo pipefail
          EXTRACT_PROTOCOL_MATRIX_FROM_CSV=1 node scripts/perf/extract-protocol-matrix.js
          test -f bench_logs/performance-lab/protocol-matrix-anomalies.json
          cat bench_logs/performance-lab/protocol-matrix-anomalies.json
          grep '"any_http2_collapse_anomaly": false' bench_logs/performance-lab/protocol-matrix-anomalies.json

  bootstrap-state-contract:
    name: Bootstrap state contract (workspace + openssl + venv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Run verify-bootstrap-state CI script
        run: bash scripts/ci/verify-bootstrap-state-ci.sh

  trace-contract-validator:
    name: Trace contract validator (fixture, no Jaeger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate trace contract rules on fixture JSON
        run: node scripts/validate-trace-contract.mjs --fixture scripts/trace-validators/fixtures/trace-contract-pass.json

  kustomize-manifest-static:
    name: Kustomize static (make verify-ci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.31.0"
      - name: Install kustomize
        run: |
          set -euo pipefail
          KUST_VER=5.4.3
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUST_VER}/kustomize_v${KUST_VER}_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin
          kustomize version
      - name: make verify-ci
        working-directory: ${{ github.workspace }}
        env:
          CI: "true"
        run: make verify-ci

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C services/${{ matrix.service }} build

  # PLAINTEXT Kafka + Zookeeper as GitHub Actions services (no OpenJDK, no JKS, no docker-run TLS broker).
  # TLS/KRaft realism stays in kafka-alignment / preflight workflows. Per-service OCH_KAFKA_TOPIC_SUFFIX isolates topics.
  integration-tests:
    name: Integration tests (all services, single broker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    env:
      KAFKA_SSL_ENABLED: "false"
      CI_KAFKA_PLAINTEXT: "1"
      KAFKA_BROKER: 127.0.0.1:9092
      OCH_KAFKA_STARTUP_BARRIER_MS: "45000"
    # Match docker-compose: one Postgres per domain DB on 5441–5448 + Redis on 6380 (Vitest defaults).
    services:
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth
        ports:
          - 5441:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-listings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: listings
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-bookings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookings
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-messaging:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: messaging
        ports:
          - 5444:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-notification:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notification
        ports:
          - 5445:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-trust:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trust
        ports:
          - 5446:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-analytics:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics
        ports:
          - 5447:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-media:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: media
        ports:
          - 5448:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 5s
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: "2181"
          ZOOKEEPER_TICK_TIME: "2000"
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/127.0.0.1/2181'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24
          --health-start-period 15s
      kafka-ci:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: "1"
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
        options: >-
          --health-cmd "bash -c 'kafka-broker-api-versions --bootstrap-server 127.0.0.1:9092 >/dev/null'"
          --health-interval 5s
          --health-timeout 15s
          --health-retries 40
          --health-start-period 40s

    steps:
      - uses: actions/checkout@v4
      - name: Wait for Kafka PLAINTEXT (bounded, no extra packages)
        run: |
          set -euo pipefail
          timeout 120 bash -c 'until bash -c "exec 3<>/dev/tcp/127.0.0.1/9092" 2>/dev/null; do echo "waiting for 127.0.0.1:9092..."; sleep 2; done'
          echo "Kafka TCP up on 127.0.0.1:9092"
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql client + apply infra/db SQL (matches local docker-compose ports)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres bash scripts/bootstrap-all-dbs.sh
      - name: Run service unit tests (parallel batches, shared broker)
        env:
          OCH_DISABLE_EXTERNALS: "1"
          CI_KAFKA_PLAINTEXT: "1"
          KAFKA_SSL_ENABLED: "false"
        run: |
          set -euo pipefail
          RID="${{ github.run_id }}"
          SERVICES=(api-gateway auth-service listings-service booking-service messaging-service trust-service analytics-service media-service notification-service)
          BATCH=4
          for ((i = 0; i < ${#SERVICES[@]}; i += BATCH)); do
            pids=()
            for ((j = i; j < i + BATCH && j < ${#SERVICES[@]}; j++)); do
              svc="${SERVICES[j]}"
              (
                set -euo pipefail
                export OCH_KAFKA_TOPIC_SUFFIX="${RID}-${svc}"
                echo "::group::pnpm test $svc"
                pnpm -C "services/${svc}" test --if-present
                echo "::endgroup::"
              ) &
              pids+=($!)
            done
            for pid in "${pids[@]}"; do wait "$pid"; done
          done
      # Listings + booking Kafka-backed HTTP integration: cluster-only (3 TLS seeds, MetalLB :9094 or explicit KAFKA_BROKER).
      # Run locally: pnpm -C services/listings-service run test:integration | pnpm -C services/booking-service run test:integration (kubectl + certs/kafka-ssl).

  transport-validation:
    name: Transport validation (Python tooling)
    runs-on: ubuntu-latest
    needs: integration-tests
    # Run whenever integration-tests finishes (success, failure, or cancelled). If we skip when
    # integration-tests is cancelled, this job is "skipped" and och-ci-gate fails on transport-validation
    # in ~seconds even though the real issue is cancelled/superseded integration (concurrency timeout).
    # integration-tests runs service unit batches against kafka-ci + Postgres; Kafka HTTP integration suites are local/cluster-only (see job comment).
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: QUIC libs on disk + py_compile + transport_validator CLI smoke
        run: |
          set -euo pipefail
          test -f scripts/lib/transport_validator.py
          test -f scripts/lib/analyze_quic_metrics.py
          test -f scripts/lib/dominance_map.py
          python3 -m py_compile scripts/lib/transport_validator.py scripts/lib/analyze_quic_metrics.py scripts/lib/dominance_map.py
          code=0
          out="$(python3 scripts/lib/transport_validator.py 2>&1)" || code=$?
          printf '%s\n' "$out"
          test "$code" -eq 2
          printf '%s\n' "$out" | grep -q 'no pcap provided'

  slo-policy:
    name: SLO policy (error budget fixture gate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check checked-in uptime summary vs 99.5% target
        run: node scripts/slo/check-error-budget.js
      - name: Deploy freeze check (no-op without PROM_URL)
        run: node scripts/slo/check-burn-rate.js
        env:
          PROM_URL: ${{ vars.OCH_PROMETHEUS_URL }}

  # Independent of integration-tests/transport-validation so a red test job does not skip this check.
  quic-hostname-invariant:
    name: Enforce QUIC hostname invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No raw-IP https BASE_URL defaults in k6 load scripts
        run: bash scripts/ci/verify-quic-hostname-invariant.sh

  playwright-strict:
    name: Strict Playwright
    runs-on: ubuntu-latest
    needs: build
    env:
      PLAYWRIGHT_STRICT_HTTP3: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Playwright strict verticals + integrity (or offline toolchain only)
        env:
          # On github-hosted, default is offline --list unless vars.PLAYWRIGHT_OFFLINE_LIST_ONLY=0 (self-hosted edge + Jaeger).
          PLAYWRIGHT_OFFLINE_LIST_ONLY: ${{ vars.PLAYWRIGHT_OFFLINE_LIST_ONLY }}
          JAEGER_QUERY_BASE: ${{ vars.JAEGER_QUERY_BASE }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/webapp"
          pnpm exec playwright install chromium --with-deps
          _offline="${PLAYWRIGHT_OFFLINE_LIST_ONLY:-}"
          if [ "${GITHUB_ACTIONS:-}" = "true" ] && [ "${_offline:-1}" = "1" ]; then
            echo "Playwright offline (GITHUB_ACTIONS + PLAYWRIGHT_OFFLINE_LIST_ONLY default 1): playwright test --list"
            echo "Set repository variable PLAYWRIGHT_OFFLINE_LIST_ONLY=0 to run test:e2e:strict-verticals-and-integrity on a runner with edge."
            pnpm exec playwright test --list
            exit 0
          fi
          if [ "${_offline:-0}" = "1" ] && [ "${GITHUB_ACTIONS:-}" != "true" ]; then
            echo "PLAYWRIGHT_OFFLINE_LIST_ONLY=1 — playwright test --list"
            pnpm exec playwright test --list
            exit 0
          fi
          if [ -z "${JAEGER_QUERY_BASE:-}" ]; then
            echo "::error::Strict Playwright requires JAEGER_QUERY_BASE (Jaeger query UI :16686). Set repository variable JAEGER_QUERY_BASE on self-hosted runners with cluster access."
            exit 1
          fi
          bash "$GITHUB_WORKSPACE/scripts/dev-generate-certs.sh"
          export NODE_EXTRA_CA_CERTS="$GITHUB_WORKSPACE/certs/dev-root.pem"
          PLAYWRIGHT_VERTICAL_STRICT=1 PLAYWRIGHT_STRICT_HTTP3=1 pnpm run test:e2e:strict-verticals-and-integrity
          chmod +x "$GITHUB_WORKSPACE/scripts/verify-jaeger-tracing-services.sh" "$GITHUB_WORKSPACE/scripts/verify-jaeger-trace-structure.sh" "$GITHUB_WORKSPACE/scripts/verify-jaeger-trace-all-verticals.sh"
          JAEGER_QUERY_BASE="$JAEGER_QUERY_BASE" "$GITHUB_WORKSPACE/scripts/verify-jaeger-tracing-services.sh"
          JAEGER_QUERY_BASE="$JAEGER_QUERY_BASE" "$GITHUB_WORKSPACE/scripts/verify-jaeger-trace-all-verticals.sh"
          cd "$GITHUB_WORKSPACE"
          JAEGER_QUERY_BASE="$JAEGER_QUERY_BASE" pnpm run test:observability

  och-ci-gate:
    name: Aggregate gate (performance + structural)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rollup-wasm-guard
      - protocol-anomaly
      - bootstrap-state-contract
      - trace-contract-validator
      - kustomize-manifest-static
      - build
      - integration-tests
      - transport-validation
      - slo-policy
      - quic-hostname-invariant
      - playwright-strict
    steps:
      - name: Enforce job results
        env:
          ROLLUP_GUARD: ${{ needs.rollup-wasm-guard.result }}
          PROTOCOL_ANOMALY: ${{ needs.protocol-anomaly.result }}
          BOOTSTRAP_STATE: ${{ needs['bootstrap-state-contract'].result }}
          TRACE_CONTRACT_FIXTURE: ${{ needs['trace-contract-validator'].result }}
          KUSTOMIZE_STATIC: ${{ needs['kustomize-manifest-static'].result }}
          BUILD: ${{ needs.build.result }}
          INTEGRATION: ${{ needs['integration-tests'].result }}
          TV: ${{ needs.transport-validation.result }}
          SLO: ${{ needs.slo-policy.result }}
          QUIC: ${{ needs.quic-hostname-invariant.result }}
          PW: ${{ needs.playwright-strict.result }}
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }
          [ "$ROLLUP_GUARD" = success ] || fail "rollup-wasm-guard: $ROLLUP_GUARD (native @rollup/rollup-* leaked into node_modules — use @rollup/wasm-node override)"
          [ "$PROTOCOL_ANOMALY" = success ] || fail "protocol-anomaly: $PROTOCOL_ANOMALY (HTTP/2 matrix collapse or missing artifacts — tuning required)"
          [ "$BOOTSTRAP_STATE" = success ] || fail "bootstrap-state-contract: $BOOTSTRAP_STATE (workspace/crypto/venv contract — see scripts/ci/verify-bootstrap-state-ci.sh)"
          [ "$TRACE_CONTRACT_FIXTURE" = success ] || fail "trace-contract-validator: $TRACE_CONTRACT_FIXTURE (scripts/validate-trace-contract.mjs fixture)"
          [ "$KUSTOMIZE_STATIC" = success ] || fail "kustomize-manifest-static: $KUSTOMIZE_STATIC (make verify-ci — kustomize build + shell checks)"
          [ "$BUILD" = success ] || fail "build matrix: $BUILD"
          [ "$INTEGRATION" = success ] || fail "integration-tests: $INTEGRATION"
          [ "$TV" = success ] || fail "transport-validation: $TV"
          [ "$SLO" = success ] || fail "slo-policy: $SLO"
          [ "$QUIC" = success ] || fail "quic-hostname-invariant: $QUIC"
          [ "$PW" = success ] || fail "playwright-strict: $PW (hosted: default --list; full strict needs PLAYWRIGHT_OFFLINE_LIST_ONLY=0 + vars.JAEGER_QUERY_BASE for observability verification)"
          echo "och-ci: all required jobs succeeded."
