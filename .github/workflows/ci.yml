# OCH — no cluster on ubuntu-latest. Structural jobs run in parallel with protocol-anomaly;
# final aggregate gate fails the workflow if anomaly or any required job failed (nothing silently skipped).
name: och-ci

# pull_request: all PRs. push: default + feature branches — pushes to fix/** etc. run CI without opening
# a PR (push-only workflows were previously silent). Same concurrency group per branch still dedupes
# overlapping push/PR syncs to one in-flight run.
on:
  push:
    branches:
      - main
      - master
      - develop
      - fix/**
      - feat/**
      - feature/**
      - chore/**
      - hotfix/**
  pull_request:

# Include event_name so push and pull_request are separate groups: otherwise both use the same branch key
# and cancel-in-progress kills the sibling run (integration tests cancelled, aggregate shows failed, PR
# checks look missing or duplicated inconsistently).
concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  rollup-wasm-guard:
    name: Rollup WASM only (no @rollup/rollup-* in pnpm tree)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/ci/verify-no-rollup-native-packages.sh

  protocol-anomaly:
    name: Protocol matrix anomaly check
    runs-on: ubuntu-latest
    env:
      # Committed protocol-comparison.csv can show H2 tail >3× H1 for some services without implying
      # live collapse; use a slightly looser multiplier in CI (local default remains 3).
      HTTP2_COLLAPSE_THRESHOLD: "5"
    steps:
      - uses: actions/checkout@v4
      - name: Verify housing *-service gRPC matrix (proto + grpc-server + server bootstrap)
        run: bash scripts/ci/verify-housing-grpc-matrix.sh
      - name: Proto events ↔ Kafka topic naming contract
        run: bash scripts/verify-proto-events-topics.sh
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Regenerate anomalies + require no HTTP/2 collapse
        run: |
          set -euo pipefail
          EXTRACT_PROTOCOL_MATRIX_FROM_CSV=1 node scripts/perf/extract-protocol-matrix.js
          test -f bench_logs/performance-lab/protocol-matrix-anomalies.json
          cat bench_logs/performance-lab/protocol-matrix-anomalies.json
          grep '"any_http2_collapse_anomaly": false' bench_logs/performance-lab/protocol-matrix-anomalies.json

  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        service:
          - api-gateway
          - auth-service
          - listings-service
          - booking-service
          - messaging-service
          - trust-service
          - analytics-service
          - media-service
          - notification-service
          - cron-jobs

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C services/${{ matrix.service }} build

  # One ZooKeeper + one TLS Kafka (scripts/ci/start-kafka-tls-ci.sh), shared Postgres/Redis — avoids N parallel
  # broker bootstraps (runner time + queue pressure). Per-service topic suffix still isolates Kafka namespaces.
  integration-tests:
    name: Integration tests (all services, single broker)
    runs-on: ubuntu-latest
    needs: build
    env:
      KAFKA_SSL_ENABLED: "true"
      KAFKA_BROKER: 127.0.0.1:29094
      KAFKA_CA_CERT: ${{ github.workspace }}/certs/kafka-ssl-ci/ca-cert.pem
      KAFKA_CLIENT_CERT: ${{ github.workspace }}/certs/kafka-ssl-ci/client.crt
      KAFKA_CLIENT_KEY: ${{ github.workspace }}/certs/kafka-ssl-ci/client.key
    # Match docker-compose: one Postgres per domain DB on 5441–5448 + Redis on 6380 (Vitest defaults).
    services:
      postgres-auth:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth
        ports:
          - 5441:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-listings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: listings
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-bookings:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookings
        ports:
          - 5443:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-messaging:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: messaging
        ports:
          - 5444:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-notification:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notification
        ports:
          - 5445:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-trust:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trust
        ports:
          - 5446:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-analytics:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics
        ports:
          - 5447:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      postgres-media:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: media
        ports:
          - 5448:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 10s
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 5s

    steps:
      - uses: actions/checkout@v4
      # Single Docker TLS broker (Zookeeper+Kafka) for Vitest — not in-cluster KRaft. Three-broker KRaft
      # manifests are validated in kafka-dns-validate (kustomize + replicas:3 assert) + kafka-cluster-verify (scripts).
      - name: Ephemeral Kafka TLS (mTLS) + start Confluent broker (once)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y openjdk-17-jdk-headless
          chmod +x scripts/ci/generate-kafka-ci-tls.sh scripts/ci/start-kafka-tls-ci.sh
          bash scripts/ci/start-kafka-tls-ci.sh
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install psql client + apply infra/db SQL (matches local docker-compose ports)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres bash scripts/bootstrap-all-dbs.sh
      - name: Run service tests sequentially (shared broker)
        run: |
          set -euo pipefail
          RID="${{ github.run_id }}"
          for svc in api-gateway auth-service listings-service booking-service messaging-service trust-service analytics-service media-service notification-service; do
            echo "::group::Test $svc"
            export OCH_KAFKA_TOPIC_SUFFIX="${RID}-${svc}"
            pnpm -C "services/${svc}" test --if-present
            if [ "$svc" = listings-service ]; then
              export POSTGRES_URL_LISTINGS="postgresql://postgres:postgres@127.0.0.1:5442/listings"
              export ANALYTICS_SYNC_MODE="0"
              export KAFKA_CONNECT_TIMEOUT_MS="15000"
              export OCH_GRPC_INSECURE_TEST_BIND="1"
              pnpm -C services/listings-service run test:integration
            fi
            echo "::endgroup::"
          done

  transport-validation:
    name: Transport validation (Python tooling)
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: QUIC libs on disk + py_compile + transport_validator CLI smoke
        run: |
          set -euo pipefail
          test -f scripts/lib/transport_validator.py
          test -f scripts/lib/analyze_quic_metrics.py
          test -f scripts/lib/dominance_map.py
          python3 -m py_compile scripts/lib/transport_validator.py scripts/lib/analyze_quic_metrics.py scripts/lib/dominance_map.py
          code=0
          out="$(python3 scripts/lib/transport_validator.py 2>&1)" || code=$?
          printf '%s\n' "$out"
          test "$code" -eq 2
          printf '%s\n' "$out" | grep -q 'no pcap provided'

  slo-policy:
    name: SLO policy (error budget fixture gate)
    runs-on: ubuntu-latest
    needs: transport-validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Check checked-in uptime summary vs 99.5% target
        run: node scripts/slo/check-error-budget.js
      - name: Deploy freeze check (no-op without PROM_URL)
        run: node scripts/slo/check-burn-rate.js
        env:
          PROM_URL: ${{ vars.OCH_PROMETHEUS_URL }}

  # Independent of integration-tests/transport-validation so a red test job does not skip this check.
  quic-hostname-invariant:
    name: Enforce QUIC hostname invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No raw-IP https BASE_URL defaults in k6 load scripts
        run: bash scripts/ci/verify-quic-hostname-invariant.sh

  playwright-strict:
    name: Strict Playwright
    runs-on: ubuntu-latest
    needs: transport-validation
    env:
      PLAYWRIGHT_STRICT_HTTP3: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Full strict E2E (RUN_STRICT_PLAYWRIGHT) or Playwright smoke (default)
        env:
          RUN_STRICT_PLAYWRIGHT: ${{ vars.RUN_STRICT_PLAYWRIGHT }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/webapp"
          pnpm exec playwright install chromium --with-deps
          if [ "${RUN_STRICT_PLAYWRIGHT:-}" = "true" ]; then
            bash "$GITHUB_WORKSPACE/scripts/dev-generate-certs.sh"
            export NODE_EXTRA_CA_CERTS="$GITHUB_WORKSPACE/certs/dev-root.pem"
            PLAYWRIGHT_VERTICAL_STRICT=1 PLAYWRIGHT_STRICT_HTTP3=1 pnpm run test:e2e:strict-verticals-and-integrity
          else
            echo "RUN_STRICT_PLAYWRIGHT not true — Playwright toolchain smoke (test --list)"
            pnpm exec playwright test --list
          fi

  och-ci-gate:
    name: Aggregate gate (performance + structural)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rollup-wasm-guard
      - protocol-anomaly
      - build
      - integration-tests
      - transport-validation
      - slo-policy
      - quic-hostname-invariant
      - playwright-strict
    steps:
      - name: Enforce job results
        env:
          ROLLUP_GUARD: ${{ needs.rollup-wasm-guard.result }}
          PROTOCOL_ANOMALY: ${{ needs.protocol-anomaly.result }}
          BUILD: ${{ needs.build.result }}
          INTEGRATION: ${{ needs['integration-tests'].result }}
          TV: ${{ needs.transport-validation.result }}
          SLO: ${{ needs.slo-policy.result }}
          QUIC: ${{ needs.quic-hostname-invariant.result }}
          PW: ${{ needs.playwright-strict.result }}
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }
          [ "$ROLLUP_GUARD" = success ] || fail "rollup-wasm-guard: $ROLLUP_GUARD (native @rollup/rollup-* leaked into node_modules — use @rollup/wasm-node override)"
          [ "$PROTOCOL_ANOMALY" = success ] || fail "protocol-anomaly: $PROTOCOL_ANOMALY (HTTP/2 matrix collapse or missing artifacts — tuning required)"
          [ "$BUILD" = success ] || fail "build matrix: $BUILD"
          [ "$INTEGRATION" = success ] || fail "integration-tests: $INTEGRATION"
          [ "$TV" = success ] || fail "transport-validation: $TV"
          [ "$SLO" = success ] || fail "slo-policy: $SLO"
          [ "$QUIC" = success ] || fail "quic-hostname-invariant: $QUIC"
          if [ "$PW" != skipped ]; then
            [ "$PW" = success ] || fail "playwright-strict: $PW (set RUN_STRICT_PLAYWRIGHT=true for full edge E2E)"
          fi
          echo "och-ci: all required jobs succeeded."
