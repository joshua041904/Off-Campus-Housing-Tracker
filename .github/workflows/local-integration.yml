# Master directive §9: Spin docker-compose.local, run integration tests, tear down.
# Fail if TLS not enforced or plaintext Kafka allowed.
name: Local integration (TLS enforced)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  local-stack-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Enable Corepack and install pnpm from package.json
        run: |
          corepack enable
          corepack install
        # packageManager in package.json is source of truth (pnpm@9.11.0)

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate dev certs
        run: bash scripts/dev-generate-certs.sh

      # Kafka TLS: getKafkaSslConfigForTest(env with SSL enabled, no paths) throws → startup would fail without certs
      - name: Run Kafka TLS unit test (missing cert fails)
        run: pnpm --filter "@common/utils" run test

      - name: Start local stack
        run: docker compose -f docker-compose.local.yml up -d
        env:
          COMPOSE_PROJECT_NAME: ochtlocal

      - name: Apply DB schemas
        run: docker compose -f docker-compose.local.yml run --rm init-db

      - name: Wait for services
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.local.yml ps --format json 2>/dev/null | grep -q '"Health":"healthy"' || docker compose -f docker-compose.local.yml exec -T kafka kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null; then
              break
            fi
            sleep 3
          done
          sleep 5

      - name: Run unit tests (media-service)
        run: pnpm --filter media-service run test

      - name: Run event-layer-verification tests
        run: pnpm --filter event-layer-verification run test

      - name: Tear down local stack
        if: always()
        run: docker compose -f docker-compose.local.yml down -v
