# Off-Campus Housing — SLO targets (governance / chaos reporting).
# Consumed by scripts/calc-failure-budget.py and docs; Prometheus wiring is separate.
---
availability_ratio_target: 0.999        # 99.9% over window
availability_window_days: 30
mttr_target_seconds: 120
kafka_election_max_per_minute: 1        # requires metric
tls_min_days_remaining: 7
p95_latency_max_ms: 500
notes: >
  Map availability_ratio_target to your real SLI (e.g. gateway 2xx rate).
  HPA requires CPU requests on all scaled workloads — see cluster events.
