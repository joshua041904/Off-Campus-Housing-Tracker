openapi: 3.0.3
info:
  title: auth-service
  description: OCH authentication — register, login, JWT issuance, validation (canonical contract for gateway /api/auth/*).
  version: "0.0.0"
paths:
  "/api/auth/register":
    post:
      operationId: authRegister
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
        "409":
          description: Email already exists
  "/api/auth/login":
    post:
      operationId: authLogin
      summary: Authenticate and return JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
  "/api/auth/validate":
    post:
      operationId: authValidate
      summary: Validate bearer token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
  "/api/auth/refresh":
    post:
      operationId: authRefresh
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
  "/api/auth/healthz":
    get:
      operationId: authHealthz
      summary: Liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        sendVerification:
          type: boolean
          default: false
    RegisterResponse:
      type: object
      properties:
        token:
          type: string
        emailVerified:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        expires_in:
          type: integer
          example: 3600
