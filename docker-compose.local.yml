# Local dev stack — no k3s. Postgres (messaging + media), redis, minio. All on network local-dev.
# Kafka is not started here; use Colima+k3s KRaft (kafka-0..2) for eventing.

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6380:6379"]
    restart: unless-stopped
    networks: [local-dev]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data_local:/data]
    restart: unless-stopped
    networks: [local-dev]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres-messaging:
    image: postgres:16-alpine
    environment: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: messaging }
    restart: unless-stopped
    ports: ["5444:5432"]
    volumes: [pgdata_messaging_local:/var/lib/postgresql/data]
    networks: [local-dev]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  postgres-media:
    image: postgres:16-alpine
    environment: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: media }
    restart: unless-stopped
    ports: ["5448:5432"]
    volumes: [pgdata_media_local:/var/lib/postgresql/data]
    networks: [local-dev]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  # Optional: apply schemas after Postgres is up. Run once: docker compose -f docker-compose.local.yml run --rm init-db
  init-db:
    image: postgres:16-alpine
    depends_on:
      postgres-messaging: { condition: service_healthy }
      postgres-media: { condition: service_healthy }
    environment: { PGPASSWORD: postgres }
    volumes:
      - ./infra/db:/sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Applying messaging schema..."
        psql -h postgres-messaging -p 5432 -U postgres -d messaging -v ON_ERROR_STOP=1 -f /sql/01-messaging-schema.sql
        psql -h postgres-messaging -p 5432 -U postgres -d messaging -v ON_ERROR_STOP=1 -f /sql/02-messaging-outbox.sql || true
        psql -h postgres-messaging -p 5432 -U postgres -d messaging -v ON_ERROR_STOP=1 -f /sql/04-messaging-media-id.sql || true
        echo "Applying media schema..."
        psql -h postgres-media -p 5432 -U postgres -d media -v ON_ERROR_STOP=1 -f /sql/01-media-schema.sql
        psql -h postgres-media -p 5432 -U postgres -d media -v ON_ERROR_STOP=1 -f /sql/02-media-outbox.sql || true
        echo "Done."
    networks: [local-dev]
    restart: "no"

networks:
  local-dev:
    driver: bridge

volumes:
  pgdata_messaging_local:
  pgdata_media_local:
  minio_data_local:
